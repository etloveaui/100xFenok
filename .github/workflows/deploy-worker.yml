# Deploy the Next.js app to Cloudflare Workers via OpenNext.
#
# Triggers:
#   - push to main affecting source/UI/legacy paths -> immediate deploy
#     (generic nested data is excluded, but app-served /data assets are
#     re-included so Worker bundles do not lag behind Pages)
#   - daily schedule -> picks up bot-authored data refreshes into the bundle
#   - workflow_dispatch -> manual deploy
name: Deploy Worker (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - '100xfenok-next/**'
      - '100x/**'
      - 'alpha-scout/**'
      - 'tools/**'
      - 'ib/**'
      - 'admin/**'
      - 'posts/**'
      - '!**/data/**'
      - '100xfenok-next/public/data/**'
      - '.github/workflows/deploy-worker.yml'
  schedule:
    - cron: '30 3 * * *'  # 12:30 KST, after update-manifest data refresh
  workflow_dispatch:

concurrency:
  group: workers-100xfenok-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: 100xfenok-next
        run: npm ci

      - name: Run admin live bridge guards
        working-directory: 100xfenok-next
        run: npm run test:live-bridge

      - name: Verify EDGAR summary evidence guards
        working-directory: 100xfenok-next
        run: npm run qa:edgar-summaries

      - name: Reconcile derived data
        working-directory: 100xfenok-next
        run: npm run reconcile:derived

      - name: Verify derived data
        working-directory: 100xfenok-next
        run: npm run reconcile:verify

      - name: Verify data health KPI contract
        working-directory: 100xfenok-next
        run: npm run qa:fenok-data-health-kpi

      - name: Verify product data-state rendering contract
        working-directory: 100xfenok-next
        run: npm run qa:data-state

      - name: Verify IB V2 calculator parity (no drift vs V1)
        working-directory: 100xfenok-next
        run: npm run qa:ib-parity

      - name: Verify IB V2 live-data input quirks
        working-directory: 100xfenok-next
        run: npm run qa:ib-live-data

      - name: Verify public SEO surface
        working-directory: 100xfenok-next
        run: npm run qa:seo-surface

      - name: Build (OpenNext Cloudflare)
        working-directory: 100xfenok-next
        run: npm run cf:build

      - name: Verify Worker bundle budget
        working-directory: 100xfenok-next
        run: npm run qa:worker-bundle-budget

      - name: Verify build manifest routes presence
        run: node scripts/check-source-paths.mjs

      - name: Verify Cloudflare token presence
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret is missing or empty. Deploy cannot proceed."
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        working-directory: 100xfenok-next
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke data health KPI
        run: |
          curl -fsS "https://100xfenok.etloveaui.workers.dev/data/admin/fenok-data-health-kpi.json?cb=${GITHUB_SHA}" \
            | node -e 'const fs=require("fs"); const p=JSON.parse(fs.readFileSync(0,"utf8")); const okSchema = p.schema_version === "fenok-data-health-kpi/v1" || p.schema_version === "fenok-data-health-kpi/v2"; if (!okSchema || p.status !== "ready") { console.error(JSON.stringify({schema_version:p.schema_version,status:p.status})); process.exit(1); } if (p.schema_version === "fenok-data-health-kpi/v2") { const r = p.runtime || {}; if (!r.built_at || r.fresh !== true || r.hard_age_ok !== true) { console.warn("::warning:: KPI v2 producer freshness (warn-only, Phase A): " + JSON.stringify({built_at:r.built_at, fresh:r.fresh, hard_age_ok:r.hard_age_ok, missed_slot_count:r.missed_slot_count})); } console.log(JSON.stringify({ok:true, schema:p.schema_version, status:p.status, built_at:r.built_at, fresh:r.fresh, hard_age_ok:r.hard_age_ok, missed_slot_count:r.missed_slot_count}, null, 2)); } else { console.log(JSON.stringify({ok:true, generated_at:p.generated_at, status:p.status, lanes:p.totals?.lanes}, null, 2)); }'

      - name: Smoke StockAnalysis routes
        working-directory: 100xfenok-next
        run: npm run qa:stockanalysis
        env:
          QA_BASE_URL: https://100xfenok.etloveaui.workers.dev
          QA_STOCKANALYSIS_RETRIES: 3
          QA_STOCKANALYSIS_RETRY_DELAY_MS: 10000

      - name: Smoke route iframe public contract
        working-directory: 100xfenok-next
        run: npm run qa:route-iframe-contract
        env:
          QA_BASE_URL: https://100xfenok.etloveaui.workers.dev
          QA_ROUTE_IFRAME_ALLOW_REMOTE: "1"
          QA_ROUTE_IFRAME_SCOPE: public

      - name: Smoke route iframe admin contract
        working-directory: 100xfenok-next
        run: |
          if [ -z "${QA_ADMIN_PASSWORD:-}" ] && [ -z "${QA_ADMIN_SESSION_COOKIE:-}" ]; then
            echo "::notice::Skipping admin route iframe smoke: set QA_ADMIN_PASSWORD or QA_ADMIN_SESSION_COOKIE to enable gated admin iframe verification."
            exit 0
          fi
          npm run qa:route-iframe-contract
        env:
          QA_BASE_URL: https://100xfenok.etloveaui.workers.dev
          QA_ROUTE_IFRAME_ALLOW_REMOTE: "1"
          QA_ROUTE_IFRAME_SCOPE: admin
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_ADMIN_SESSION_COOKIE: ${{ secrets.QA_ADMIN_SESSION_COOKIE }}
