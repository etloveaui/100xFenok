# Deploy the Next.js app to Cloudflare Workers via OpenNext.
#
# Triggers:
#   - push to main affecting source/UI/legacy paths -> immediate deploy
#     (generic nested data is excluded, but app-served /data assets are
#     re-included so Worker bundles do not lag behind Pages)
#   - daily schedule -> picks up bot-authored data refreshes into the bundle
#   - workflow_dispatch -> manual deploy
#
# Cancellation safety (BACKLOG #361, incident 2026-07-16: cancelled run
# 29502469123 uploaded its bundle and was superseded before its smokes ran —
# the live Worker served an UNVERIFIED bundle for ~15h while CI recorded no
# green):
#   - build-verify is supersession-friendly (cancel-in-progress: true): a newer
#     push cancels a stale build cheaply, before anything can ship.
#   - deploy is cancellation-atomic (cancel-in-progress: false): once a run
#     reaches upload, it always finishes its smokes. Newer runs queue, and a
#     queued deploy skips itself BEFORE upload if a newer run is already active
#     (scripts/check-deploy-supersession.mjs) — skipping never happens after
#     an upload, so a deploy is never interrupted mid-flight.
#   - every bundle carries data/admin/deploy-provenance.json declaring the run
#     that shipped it; the deploy job asserts the CURRENT live bundle's
#     provenance before (loud, non-blocking) and after (blocking) upload
#     (scripts/check-live-deploy-provenance.mjs).
name: Deploy Worker (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - '100xfenok-next/**'
      - '100x/**'
      - 'alpha-scout/**'
      - 'tools/**'
      - 'ib/**'
      - 'admin/**'
      - 'posts/**'
      - '!**/data/**'
      - '100xfenok-next/public/data/**'
      - '.github/workflows/deploy-worker.yml'
  schedule:
    - cron: '30 3 * * *'  # 12:30 KST, after update-manifest data refresh
  workflow_dispatch:

jobs:
  build-verify:
    runs-on: ubuntu-latest
    concurrency:
      group: workers-100xfenok-main-build
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: 100xfenok-next
        run: npm ci

      - name: Build data supply detection floor
        run: |
          set -euo pipefail

          repo_root="$(pwd -P)"
          shard_root="$repo_root/data/admin/data-supply-state/detection-attempts"
          output_root="$(mktemp -d "/tmp/fenok-data-supply-detection-floor-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-XXXXXX")"
          report_path="$output_root/data-supply-detection-floor.json"
          installed_path="$repo_root/data/admin/data-supply-detection-floor.json"
          trap 'rm -rf "$output_root"' EXIT

          mkdir -p "$shard_root"
          chmod 0700 "$output_root"
          now="$(node -e 'process.stdout.write(new Date().toISOString())')"

          node scripts/build-data-supply-detection-floor.mjs \
            --artifact-root "$repo_root" \
            --attempt-shard-root "$shard_root" \
            --calendars "$repo_root/scripts/lib/data-supply-detection-calendars.json" \
            --now "$now" \
            --output-root "$output_root"
          node scripts/build-data-supply-detection-floor.mjs --verify-report "$report_path"

          install -m 0644 "$report_path" "$installed_path"
          cmp -s "$report_path" "$installed_path"
          node scripts/build-data-supply-detection-floor.mjs --verify-report "$installed_path"

      - name: Reconcile derived data
        working-directory: 100xfenok-next
        run: npm run reconcile:derived

      - name: Verify derived data
        working-directory: 100xfenok-next
        run: npm run reconcile:verify

      - name: Verify data health KPI contract
        working-directory: 100xfenok-next
        run: npm run qa:fenok-data-health-kpi:artifact

      - name: Build (OpenNext Cloudflare)
        working-directory: 100xfenok-next
        run: npm run cf:build

      - name: Verify Worker bundle budget
        working-directory: 100xfenok-next
        run: npm run qa:worker-bundle-budget

      - name: Verify build manifest routes presence
        run: node scripts/check-source-paths.mjs

      - name: Stamp deploy provenance
        run: node scripts/write-deploy-provenance.mjs --assets-dir 100xfenok-next/.open-next/assets

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: open-next-bundle-${{ github.run_id }}
          path: 100xfenok-next/.open-next
          include-hidden-files: true
          overwrite: true
          retention-days: 1
          if-no-files-found: error

  # Repo-source unit gates. These read only committed sources and fixtures
  # (temp data roots + injected clock), never the built bundle or regenerated
  # derived data, so they are correct to run concurrently with build-verify.
  # Splitting them out also runs the KPI fixture suite ONCE per deploy instead
  # of once per chain call site.
  unit-gates:
    runs-on: ubuntu-latest
    concurrency:
      group: workers-100xfenok-main-unit-gates
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: 100xfenok-next
        run: npm ci

      - name: Verify data health KPI fixtures
        working-directory: 100xfenok-next
        run: npm run qa:fenok-data-health-kpi:fixtures

      - name: Run admin live bridge guards
        working-directory: 100xfenok-next
        run: npm run test:live-bridge

      - name: Verify EDGAR summary evidence guards
        working-directory: 100xfenok-next
        run: npm run qa:edgar-summaries

      - name: Verify product data-state rendering contract
        working-directory: 100xfenok-next
        run: npm run qa:data-state

      - name: Verify IB V2 calculator parity (no drift vs V1)
        working-directory: 100xfenok-next
        run: npm run qa:ib-parity

      - name: Verify IB V2 live-data input quirks
        working-directory: 100xfenok-next
        run: npm run qa:ib-live-data

      - name: Verify public SEO surface
        working-directory: 100xfenok-next
        run: npm run qa:seo-surface

  deploy:
    needs: [build-verify, unit-gates]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 35
    concurrency:
      group: workers-100xfenok-main-deploy
      cancel-in-progress: false
    env:
      QA_ADMIN_SMOKE_AVAILABLE: ${{ (secrets.QA_ADMIN_PASSWORD != '' || secrets.QA_ADMIN_SESSION_COOKIE != '') && 'true' || 'false' }}
      GITHUB_WORKFLOW_FILE_NAME: deploy-worker.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: 100xfenok-next
        run: npm ci

      - name: Download built bundle
        uses: actions/download-artifact@v4
        with:
          name: open-next-bundle-${{ github.run_id }}
          path: 100xfenok-next/.open-next

      - name: Resolve expected bundle identity
        working-directory: 100xfenok-next
        run: |
          set -euo pipefail
          expected_build_id_path=".open-next/assets/BUILD_ID"
          expected_kpi_path=".open-next/assets/data/admin/fenok-data-health-kpi.json"
          if [ ! -s "$expected_build_id_path" ] || [ ! -f "$expected_kpi_path" ]; then
            echo "::error::Cannot establish deploy identity from the downloaded artifact."
            exit 1
          fi
          {
            echo "EXPECTED_BUILD_ID=$(tr -d '\r\n' < "$expected_build_id_path")"
            echo "EXPECTED_KPI_SHA256=$(sha256sum "$expected_kpi_path" | awk '{print $1}')"
          } >> "$GITHUB_ENV"

      - name: Skip deploy if superseded by a newer run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-deploy-supersession.mjs

      - name: Verify Cloudflare token presence
        if: ${{ env.SUPERSEDED != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret is missing or empty. Deploy cannot proceed."
            exit 1
          fi

      - name: Check live deploy provenance (pre-deploy)
        if: ${{ env.SUPERSEDED != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-live-deploy-provenance.mjs --pre

      - name: Deploy to Cloudflare Workers
        if: ${{ env.SUPERSEDED != 'true' }}
        working-directory: 100xfenok-next
        run: |
          set -euo pipefail

          base_url="https://100xfenok.etloveaui.workers.dev"
          expected_build_id_path=".open-next/assets/BUILD_ID"
          expected_kpi_path=".open-next/assets/data/admin/fenok-data-health-kpi.json"
          if [ ! -s "$expected_build_id_path" ] || [ ! -f "$expected_kpi_path" ]; then
            echo "::error::Cannot establish deploy identity from the built artifact."
            exit 1
          fi
          expected_build_id="$(tr -d '\r\n' < "$expected_build_id_path")"
          expected_kpi_sha256="$(sha256sum "$expected_kpi_path" | awk '{print $1}')"
          if [ -z "$expected_build_id" ]; then
            echo "::error::Built artifact has an empty BUILD_ID."
            exit 1
          fi

          predeploy_build_id="unavailable"
          predeploy_kpi_sha256="unavailable"
          predeploy_kpi_path="$RUNNER_TEMP/predeploy-fenok-data-health-kpi.json"
          cache_bust="predeploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA}"
          if predeploy_build_id="$(curl -fsS --retry 3 --retry-all-errors --retry-delay 2 \
            -H 'Cache-Control: no-cache, no-store' -H 'Pragma: no-cache' \
            "$base_url/BUILD_ID?cb=$cache_bust" | tr -d '\r\n')" \
            && curl -fsS --retry 3 --retry-all-errors --retry-delay 2 \
              -H 'Cache-Control: no-cache, no-store' -H 'Pragma: no-cache' \
              "$base_url/data/admin/fenok-data-health-kpi.json?cb=$cache_bust" \
              -o "$predeploy_kpi_path"; then
            predeploy_kpi_sha256="$(sha256sum "$predeploy_kpi_path" | awk '{print $1}')"
          else
            echo "::warning::Pre-deploy bundle identity was unavailable; post-deploy identity verification remains mandatory."
          fi

          if [ "$predeploy_build_id" = "$expected_build_id" ]; then
            echo "::error::The new build reused the currently live BUILD_ID; deployment identity would be ambiguous."
            exit 1
          fi

          deploy_log="$RUNNER_TEMP/wrangler-deploy.log"
          wrangler_output="$RUNNER_TEMP/wrangler-output.jsonl"
          rm -f "$wrangler_output"
          WRANGLER_OUTPUT_FILE_PATH="$wrangler_output" npx wrangler deploy 2>&1 | tee "$deploy_log"
          if [ ! -s "$wrangler_output" ]; then
            echo "::error::Wrangler deploy produced no structured output."
            exit 1
          fi
          deploy_version_id="$(node -e '
            const fs = require("fs");
            const records = fs.readFileSync(process.argv[1], "utf8")
              .split(/\r?\n/)
              .filter(Boolean)
              .map((line) => JSON.parse(line));
            const deploy = records.reverse().find((record) => record.type === "deploy");
            process.stdout.write(deploy?.version_id ?? "");
          ' "$wrangler_output")"
          if [ -z "$deploy_version_id" ]; then
            echo "::error::Wrangler deploy succeeded without a parseable Version ID."
            exit 1
          fi

          {
            echo "EXPECTED_BUILD_ID=$expected_build_id"
            echo "EXPECTED_KPI_SHA256=$expected_kpi_sha256"
            echo "PREDEPLOY_BUILD_ID=$predeploy_build_id"
            echo "PREDEPLOY_KPI_SHA256=$predeploy_kpi_sha256"
            echo "DEPLOY_VERSION_ID=$deploy_version_id"
          } >> "$GITHUB_ENV"
          echo "::notice::Deployed artifact identity: wrangler_version_id=$deploy_version_id build_id=$expected_build_id kpi_sha256=$expected_kpi_sha256"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke data health KPI
        if: ${{ env.SUPERSEDED != 'true' }}
        run: |
          set -euo pipefail

          base_url="https://100xfenok.etloveaui.workers.dev"
          timeout_seconds="${SMOKE_PROPAGATION_TIMEOUT_SECONDS:-180}"
          interval_seconds="${SMOKE_PROPAGATION_INTERVAL_SECONDS:-5}"
          live_build_id_path="$RUNNER_TEMP/live-BUILD_ID"
          live_kpi_path="$RUNNER_TEMP/live-fenok-data-health-kpi.json"

          bundle_identity_matches() {
            [ "$1" = "$EXPECTED_BUILD_ID" ] && [ "$2" = "$EXPECTED_KPI_SHA256" ]
          }

          if bundle_identity_matches "$PREDEPLOY_BUILD_ID" "$PREDEPLOY_KPI_SHA256"; then
            echo "::error::Stale-bundle rejection guard accepted the pre-deploy artifact."
            exit 1
          fi
          echo "::notice::STALE BUNDLE REJECTED: build_id=$PREDEPLOY_BUILD_ID kpi_sha256=$PREDEPLOY_KPI_SHA256"

          deadline=$((SECONDS + timeout_seconds))
          attempt=0
          matched=false
          observed_build_id="unavailable"
          observed_kpi_sha256="unavailable"
          while [ "$SECONDS" -le "$deadline" ]; do
            attempt=$((attempt + 1))
            cache_bust="postdeploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}-${GITHUB_SHA}"
            rm -f "$live_build_id_path" "$live_kpi_path"
            if curl -fsS --connect-timeout 5 --max-time 15 \
              -H 'Cache-Control: no-cache, no-store' -H 'Pragma: no-cache' \
              "$base_url/BUILD_ID?cb=$cache_bust" -o "$live_build_id_path" \
              && curl -fsS --connect-timeout 5 --max-time 15 \
                -H 'Cache-Control: no-cache, no-store' -H 'Pragma: no-cache' \
                "$base_url/data/admin/fenok-data-health-kpi.json?cb=$cache_bust" \
                -o "$live_kpi_path"; then
              observed_build_id="$(tr -d '\r\n' < "$live_build_id_path")"
              observed_kpi_sha256="$(sha256sum "$live_kpi_path" | awk '{print $1}')"
              if bundle_identity_matches "$observed_build_id" "$observed_kpi_sha256"; then
                matched=true
                break
              fi
            else
              observed_build_id="unavailable"
              observed_kpi_sha256="unavailable"
            fi

            echo "::warning::Propagation attempt $attempt rejected stale or unavailable bundle: observed_build_id=$observed_build_id observed_kpi_sha256=$observed_kpi_sha256 expected_build_id=$EXPECTED_BUILD_ID expected_kpi_sha256=$EXPECTED_KPI_SHA256"
            if [ $((SECONDS + interval_seconds)) -gt "$deadline" ]; then
              break
            fi
            sleep "$interval_seconds"
          done

          if [ "$matched" != "true" ]; then
            echo "::error::Timed out after ${timeout_seconds}s waiting for this deploy's bundle: wrangler_version_id=$DEPLOY_VERSION_ID expected_build_id=$EXPECTED_BUILD_ID observed_build_id=$observed_build_id expected_kpi_sha256=$EXPECTED_KPI_SHA256 observed_kpi_sha256=$observed_kpi_sha256"
            exit 1
          fi

          echo "::notice::DEPLOYMENT IDENTITY MATCH: wrangler_version_id=$DEPLOY_VERSION_ID expected_build_id=$EXPECTED_BUILD_ID live_build_id=$observed_build_id expected_kpi_sha256=$EXPECTED_KPI_SHA256 live_kpi_sha256=$observed_kpi_sha256 attempts=$attempt"
          node -e 'const fs=require("fs"); const p=JSON.parse(fs.readFileSync(0,"utf8")); const okSchema = p.schema_version === "fenok-data-health-kpi/v1" || p.schema_version === "fenok-data-health-kpi/v2"; const topStatusOk = p.status === "ready" || p.status === "degraded"; const integrity = p.deployment_integrity || {}; if (!okSchema || !topStatusOk || (p.schema_version === "fenok-data-health-kpi/v2" && integrity.status !== "ready")) { console.error(JSON.stringify({schema_version:p.schema_version,status:p.status,deployment_integrity:integrity.status,integrity_blockers:integrity.blocker_count})); process.exit(1); } if (p.schema_version === "fenok-data-health-kpi/v2") { const r = p.runtime || {}; const cadenceOk = r.verdict === "ready" || r.verdict === "degraded"; if (!r.built_at || !cadenceOk || r.fresh !== true || r.hard_age_ok !== true) { console.error("KPI v2 producer freshness (strict, Phase B): " + JSON.stringify({built_at:r.built_at, verdict:r.verdict, slot_status:r.slot_status, fresh:r.fresh, hard_age_ok:r.hard_age_ok, missed_slot_count:r.missed_slot_count, recovered_missed_slot_count:r.recovered_missed_slot_count, unrecovered_missed_slot_count:r.unrecovered_missed_slot_count})); process.exit(1); } if (p.status === "degraded") console.warn("::warning:: KPI v2 degraded lanes: " + p.status_message); if (r.verdict === "degraded") console.warn("::warning:: KPI v2 recovered cadence miss: " + r.status_message); console.log(JSON.stringify({ok:true, schema:p.schema_version, status:p.status, status_message:p.status_message, deployment_integrity:integrity.status, degraded_lanes:(p.lanes||[]).filter(l=>l.status==="degraded").map(l=>({id:l.id,message:l.status_message})), built_at:r.built_at, verdict:r.verdict, slot_status:r.slot_status, runtime_status_message:r.status_message, fresh:r.fresh, hard_age_ok:r.hard_age_ok, missed_slot_count:r.missed_slot_count, recovered_missed_slot_count:r.recovered_missed_slot_count, unrecovered_missed_slot_count:r.unrecovered_missed_slot_count}, null, 2)); } else { console.log(JSON.stringify({ok:true, generated_at:p.generated_at, status:p.status, lanes:p.totals?.lanes}, null, 2)); }' < "$live_kpi_path"

          node scripts/check-live-deploy-provenance.mjs --post

      - name: Smoke StockAnalysis routes
        if: ${{ env.SUPERSEDED != 'true' }}
        working-directory: 100xfenok-next
        run: |
          set -euo pipefail
          observed_build_id="unavailable"
          for attempt in 1 2 3; do
            if observed_build_id="$(curl -fsS --connect-timeout 5 --max-time 15 \
              -H 'Cache-Control: no-cache, no-store' -H 'Pragma: no-cache' \
              "$QA_BASE_URL/BUILD_ID?cb=stockanalysis-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}-${GITHUB_SHA}" \
              | tr -d '\r\n')" && [ "$observed_build_id" = "$EXPECTED_BUILD_ID" ]; then
              break
            fi
            echo "::warning::StockAnalysis smoke rejected bundle identity on attempt $attempt: expected_build_id=$EXPECTED_BUILD_ID observed_build_id=$observed_build_id"
            [ "$attempt" -eq 3 ] || sleep 5
          done
          if [ "$observed_build_id" != "$EXPECTED_BUILD_ID" ]; then
            echo "::error::StockAnalysis smoke cannot prove it is reading this deploy: wrangler_version_id=$DEPLOY_VERSION_ID expected_build_id=$EXPECTED_BUILD_ID observed_build_id=$observed_build_id"
            exit 1
          fi
          echo "::notice::StockAnalysis smoke bundle match: wrangler_version_id=$DEPLOY_VERSION_ID build_id=$observed_build_id"
          npm run qa:stockanalysis
        env:
          QA_BASE_URL: https://100xfenok.etloveaui.workers.dev
          QA_STOCKANALYSIS_RETRIES: 3
          QA_STOCKANALYSIS_RETRY_DELAY_MS: 10000

      - name: Smoke route iframe public contract
        if: ${{ env.SUPERSEDED != 'true' }}
        working-directory: 100xfenok-next
        run: |
          set -euo pipefail
          observed_build_id="unavailable"
          for attempt in 1 2 3; do
            if observed_build_id="$(curl -fsS --connect-timeout 5 --max-time 15 \
              -H 'Cache-Control: no-cache, no-store' -H 'Pragma: no-cache' \
              "$QA_BASE_URL/BUILD_ID?cb=iframe-public-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}-${GITHUB_SHA}" \
              | tr -d '\r\n')" && [ "$observed_build_id" = "$EXPECTED_BUILD_ID" ]; then
              break
            fi
            echo "::warning::Public iframe smoke rejected bundle identity on attempt $attempt: expected_build_id=$EXPECTED_BUILD_ID observed_build_id=$observed_build_id"
            [ "$attempt" -eq 3 ] || sleep 5
          done
          if [ "$observed_build_id" != "$EXPECTED_BUILD_ID" ]; then
            echo "::error::Public iframe smoke cannot prove it is reading this deploy: wrangler_version_id=$DEPLOY_VERSION_ID expected_build_id=$EXPECTED_BUILD_ID observed_build_id=$observed_build_id"
            exit 1
          fi
          echo "::notice::Public iframe smoke bundle match: wrangler_version_id=$DEPLOY_VERSION_ID build_id=$observed_build_id"
          npm run qa:route-iframe-contract
        env:
          QA_BASE_URL: https://100xfenok.etloveaui.workers.dev
          QA_ROUTE_IFRAME_ALLOW_REMOTE: "1"
          QA_ROUTE_IFRAME_SCOPE: public

      - name: Smoke route iframe admin contract
        if: ${{ env.QA_ADMIN_SMOKE_AVAILABLE == 'true' && env.SUPERSEDED != 'true' }}
        working-directory: 100xfenok-next
        run: |
          set -euo pipefail
          observed_build_id="unavailable"
          for attempt in 1 2 3; do
            if observed_build_id="$(curl -fsS --connect-timeout 5 --max-time 15 \
              -H 'Cache-Control: no-cache, no-store' -H 'Pragma: no-cache' \
              "$QA_BASE_URL/BUILD_ID?cb=iframe-admin-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}-${GITHUB_SHA}" \
              | tr -d '\r\n')" && [ "$observed_build_id" = "$EXPECTED_BUILD_ID" ]; then
              break
            fi
            echo "::warning::Admin iframe smoke rejected bundle identity on attempt $attempt: expected_build_id=$EXPECTED_BUILD_ID observed_build_id=$observed_build_id"
            [ "$attempt" -eq 3 ] || sleep 5
          done
          if [ "$observed_build_id" != "$EXPECTED_BUILD_ID" ]; then
            echo "::error::Admin iframe smoke cannot prove it is reading this deploy: wrangler_version_id=$DEPLOY_VERSION_ID expected_build_id=$EXPECTED_BUILD_ID observed_build_id=$observed_build_id"
            exit 1
          fi
          echo "::notice::Admin iframe smoke bundle match: wrangler_version_id=$DEPLOY_VERSION_ID build_id=$observed_build_id"
          npm run qa:route-iframe-contract
        env:
          QA_BASE_URL: https://100xfenok.etloveaui.workers.dev
          QA_ROUTE_IFRAME_ALLOW_REMOTE: "1"
          QA_ROUTE_IFRAME_SCOPE: admin
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_ADMIN_SESSION_COOKIE: ${{ secrets.QA_ADMIN_SESSION_COOKIE }}
