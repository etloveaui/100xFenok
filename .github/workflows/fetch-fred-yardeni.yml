# Feno Yardeni weekly valuation model.
# Builds public-safe Yardeni fields from FRED WAAA/WBAA plus 100x benchmark
# S&P 500 price/EPS. Raw FRED bond-yield components stay under _private/.

name: Fetch FRED Yardeni Data

on:
  schedule:
    # UTC Saturday 10:00 = KST Saturday 19:00, after the weekly FRED print.
    - cron: '0 10 * * 6'
  workflow_dispatch:
    inputs:
      controlled_failure_key:
        description: 'Dispatch-only chaos key (yardney_model)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

env:
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-fred-yardeni:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test Feno Yardeni builder
        run: |
          node scripts/test-build-feno-yardeni-model.mjs
          node scripts/test-build-feno-yardeni-lkg-recovery.mjs

      - name: Build Feno Yardeni model from FRED
        id: fetch_yardeni
        env:
          INPUT_CONTROLLED_FAILURE_KEY: ${{ github.event.inputs.controlled_failure_key || '' }}
        run: node scripts/build-feno-yardeni-model.mjs --fetch

      - name: Validate public payload
        if: ${{ steps.fetch_yardeni.outcome == 'success' }}
        run: node 100xfenok-next/scripts/check-fenok-public-mirror-guard.mjs

      - name: Commit and push Feno Yardeni data
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_yardeni.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Public-safe detection attempt shard AND the Yardeni LKG recovery state
          # (freshness marker + retained LKG copy + recovery index) are committed on
          # every run so retry/recovery accounting survives across CI runs. These
          # carry no FRED bond-yield components.
          for SHARD in \
            data/admin/data-supply-state/detection-attempts/fred_yardeni.json \
            data/admin/fred_yardeni/index.json \
            data/admin/fred_yardeni/current/yardney_model.json \
            data/admin/fred_yardeni/lkg/yardney_model.json; do
            if [ -f "$SHARD" ]; then git add -- "$SHARD"; fi
          done
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            git add -- \
              data/yardney/yardney_model.json \
              100xfenok-next/public/data/yardney/yardney_model.json
          fi
          if git diff --staged --quiet; then
            echo "No Feno Yardeni changes to publish"
            exit 0
          fi
          git commit -m "chore: update Feno Yardeni data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
