# Feno Yardeni weekly valuation model.
# Builds public-safe Yardeni fields from FRED WAAA/WBAA plus 100x benchmark
# S&P 500 price/EPS. Raw FRED bond-yield components stay under _private/.

name: Fetch FRED Yardeni Data

on:
  schedule:
    # UTC Saturday 10:00 = KST Saturday 19:00, after the weekly FRED print.
    - cron: '0 10 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch-fred-yardeni:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test Feno Yardeni builder
        run: node scripts/test-build-feno-yardeni-model.mjs

      - name: Build Feno Yardeni model from FRED
        run: node scripts/build-feno-yardeni-model.mjs --fetch

      - name: Validate public payload
        run: node 100xfenok-next/scripts/check-fenok-public-mirror-guard.mjs

      - name: Commit and push Feno Yardeni data
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/yardney/yardney_model.json \
            100xfenok-next/public/data/yardney/yardney_model.json
          if git diff --staged --quiet; then
            echo "No Feno Yardeni changes to publish"
            exit 0
          fi
          git commit -m "chore: update Feno Yardeni data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
