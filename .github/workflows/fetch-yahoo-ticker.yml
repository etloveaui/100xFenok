name: Fetch Yahoo Finance Ticker Snapshot

# DEC-196 — cron pre-fetch for admin design-lab calculators (TQQQ/SOXL).
# Output: data/macro/yahoo-ticker.json (same-origin, 1h stale tolerance).
# No untrusted input is used in run: blocks (schedule + workflow_dispatch only).

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-yahoo-ticker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: '20'

      - name: Test Yahoo ticker producer contracts
        run: node scripts/test-fetch-yahoo-ticker.mjs

      - name: Fetch Yahoo Finance chart snapshot and persist attempt evidence
        id: fetch_yahoo
        run: node scripts/fetch-yahoo-ticker.mjs

      - name: Verify output
        if: ${{ steps.fetch_yahoo.outcome == 'success' }}
        run: |
          echo "=== Generated JSON ==="
          head -40 data/macro/yahoo-ticker.json
          echo "..."
          echo "Total lines: $(wc -l < data/macro/yahoo-ticker.json)"

      - name: Commit and push
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_yahoo.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHARD="data/admin/data-supply-state/detection-attempts/yahoo_ticker_macro.json"
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            git add -- data/macro/yahoo-ticker.json 100xfenok-next/public/data/macro/yahoo-ticker.json
          fi
          if git diff --staged --quiet; then
            echo "No Yahoo ticker changes to publish"
            exit 0
          fi
          git commit -m "data: refresh yahoo-ticker snapshot (TQQQ/SOXL)"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
