# Fenok Edge KRX daily private refresh.
# Raw KRX Open API payloads stay under _private/; commits are limited to
# public-safe bridge/coverage indexes and generated route metadata.

name: Fenok Edge KRX Daily Data

on:
  schedule:
    # KST Mon-Fri 19:30, after the regular Korea cash-market close window.
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Print the resolved plan without network fetches or writes'
        required: false
        default: 'false'
      no_fetch:
        description: 'Use cached/private raw files only; do not fetch KRX'
        required: false
        default: 'false'
      krx_end_date:
        description: 'Optional KRX basDd override, YYYYMMDD'
        required: false
        default: ''
      krx_days:
        description: 'KRX weekday count'
        required: false
        default: '1'
      krx_concurrency:
        description: 'Bounded KRX request concurrency'
        required: false
        default: '2'
      krx_max_calls:
        description: 'Hard KRX call budget per run'
        required: false
        default: '40'
      krx_sleep_ms:
        description: 'Milliseconds between KRX request attempts per worker'
        required: false
        default: '250'
      krx_fail_threshold:
        description: 'Maximum failed KRX files before the run fails'
        required: false
        default: '0'
      allow_empty_daily:
        description: 'Allow empty KOSPI/KOSDAQ issuer daily rows'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: fenok-edge-krx-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh-fenok-edge-krx:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve KRX bounded window
        id: window
        env:
          INPUT_PLAN_ONLY: ${{ github.event.inputs.plan_only || 'false' }}
          INPUT_NO_FETCH: ${{ github.event.inputs.no_fetch || 'false' }}
          INPUT_KRX_END_DATE: ${{ github.event.inputs.krx_end_date || '' }}
          INPUT_KRX_DAYS: ${{ github.event.inputs.krx_days || '1' }}
          INPUT_KRX_CONCURRENCY: ${{ github.event.inputs.krx_concurrency || '2' }}
          INPUT_KRX_MAX_CALLS: ${{ github.event.inputs.krx_max_calls || '40' }}
          INPUT_KRX_SLEEP_MS: ${{ github.event.inputs.krx_sleep_ms || '250' }}
          INPUT_KRX_FAIL_THRESHOLD: ${{ github.event.inputs.krx_fail_threshold || '0' }}
          INPUT_ALLOW_EMPTY_DAILY: ${{ github.event.inputs.allow_empty_daily || 'false' }}
        shell: bash
        run: |
          KRX_END_DATE="${INPUT_KRX_END_DATE:-$(TZ=Asia/Seoul date +%Y%m%d)}"
          {
            echo "krx_end_date=$KRX_END_DATE"
            echo "krx_days=${INPUT_KRX_DAYS:-1}"
            echo "krx_run_id=krx_daily_${KRX_END_DATE}"
            echo "krx_concurrency=${INPUT_KRX_CONCURRENCY:-2}"
            echo "krx_max_calls=${INPUT_KRX_MAX_CALLS:-40}"
            echo "krx_sleep_ms=${INPUT_KRX_SLEEP_MS:-250}"
            echo "krx_fail_threshold=${INPUT_KRX_FAIL_THRESHOLD:-0}"
          } >> "$GITHUB_OUTPUT"
          echo "FENOK_KRX_PLAN_ONLY=${INPUT_PLAN_ONLY:-false}" >> "$GITHUB_ENV"
          echo "FENOK_KRX_NO_FETCH=${INPUT_NO_FETCH:-false}" >> "$GITHUB_ENV"
          echo "FENOK_KRX_ALLOW_EMPTY_DAILY=${INPUT_ALLOW_EMPTY_DAILY:-false}" >> "$GITHUB_ENV"

      - name: Refresh KRX private daily source
        env:
          KRX_OPEN_API_AUTH_KEY: ${{ secrets.KRX_OPEN_API_AUTH_KEY }}
        shell: bash
        run: |
          ARGS=(
            "--end-date" "${{ steps.window.outputs.krx_end_date }}"
            "--days" "${{ steps.window.outputs.krx_days }}"
            "--run-id" "${{ steps.window.outputs.krx_run_id }}"
            "--concurrency" "${{ steps.window.outputs.krx_concurrency }}"
            "--max-calls" "${{ steps.window.outputs.krx_max_calls }}"
            "--sleep-ms" "${{ steps.window.outputs.krx_sleep_ms }}"
            "--fail-threshold" "${{ steps.window.outputs.krx_fail_threshold }}"
            "--scheduled-run"
          )
          if [ "${FENOK_KRX_PLAN_ONLY:-false}" = "true" ]; then ARGS+=("--plan-only"); fi
          if [ "${FENOK_KRX_NO_FETCH:-false}" = "true" ]; then ARGS+=("--no-fetch"); fi
          if [ "${FENOK_KRX_ALLOW_EMPTY_DAILY:-false}" = "true" ]; then ARGS+=("--allow-empty-daily"); fi
          node scripts/fetch-fenok-krx-daily-private.mjs "${ARGS[@]}"

      - name: Rebuild Fenok Edge public-safe derivatives
        if: ${{ env.FENOK_KRX_PLAN_ONLY != 'true' }}
        run: |
          node scripts/build-fenok-edge-coverage-index.mjs
          npm --prefix 100xfenok-next run sync-static
          npm --prefix 100xfenok-next run qa:fenok-edge-readiness

      - name: Commit and push KRX derived artifacts
        if: ${{ env.FENOK_KRX_PLAN_ONLY != 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/admin/fenok-edge-korea-krx-daily-index.json \
            data/admin/fenok-edge-coverage-index.json \
            100xfenok-next/public/data/admin/fenok-edge-korea-krx-daily-index.json \
            100xfenok-next/public/data/admin/fenok-edge-coverage-index.json \
            100xfenok-next/src/generated/static-route-manifest.ts
          git diff --staged --quiet || git commit -m "chore: update fenok edge krx daily data"
          for attempt in $(seq 1 5); do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
