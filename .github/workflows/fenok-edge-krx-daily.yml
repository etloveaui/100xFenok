# Fenok Edge KRX daily private refresh.
# Raw KRX Open API payloads stay under _private/; commits are limited to
# public-safe bridge/coverage indexes and generated route metadata.

name: Fenok Edge KRX Daily Data

on:
  schedule:
    # KST Mon-Fri 19:30. Fetch the latest settled KRX date (T-1 weekday)
    # because same-day issuer rows are not reliably complete in the Open API.
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Print the resolved plan without network fetches or writes'
        required: false
        default: 'false'
      no_fetch:
        description: 'Use cached/private raw files only; do not fetch KRX'
        required: false
        default: 'false'
      krx_end_date:
        description: 'Optional KRX basDd override, YYYYMMDD'
        required: false
        default: ''
      krx_days:
        description: 'KRX weekday count'
        required: false
        default: '1'
      krx_walkback_days:
        description: 'Auto mode: retry previous dates when issuer daily rows are empty'
        required: false
        default: '5'
      krx_concurrency:
        description: 'Bounded KRX request concurrency'
        required: false
        default: '2'
      krx_max_calls:
        description: 'Hard KRX call budget per run'
        required: false
        default: '40'
      krx_sleep_ms:
        description: 'Milliseconds between KRX request attempts per worker'
        required: false
        default: '250'
      krx_fail_threshold:
        description: 'Maximum failed KRX files before the run fails'
        required: false
        default: '0'
      allow_empty_daily:
        description: 'Allow empty KOSPI/KOSDAQ issuer daily rows'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  refresh-fenok-edge-krx:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify lane-registry commit-shard contract
        run: node scripts/test-fenok-edge-krx-daily-workflow.mjs

      - name: Resolve KRX bounded window
        id: window
        env:
          INPUT_PLAN_ONLY: ${{ github.event.inputs.plan_only || 'false' }}
          INPUT_NO_FETCH: ${{ github.event.inputs.no_fetch || 'false' }}
          INPUT_KRX_END_DATE: ${{ github.event.inputs.krx_end_date || '' }}
          INPUT_KRX_DAYS: ${{ github.event.inputs.krx_days || '1' }}
          INPUT_KRX_WALKBACK_DAYS: ${{ github.event.inputs.krx_walkback_days || '5' }}
          INPUT_KRX_CONCURRENCY: ${{ github.event.inputs.krx_concurrency || '2' }}
          INPUT_KRX_MAX_CALLS: ${{ github.event.inputs.krx_max_calls || '40' }}
          INPUT_KRX_SLEEP_MS: ${{ github.event.inputs.krx_sleep_ms || '250' }}
          INPUT_KRX_FAIL_THRESHOLD: ${{ github.event.inputs.krx_fail_threshold || '0' }}
          INPUT_ALLOW_EMPTY_DAILY: ${{ github.event.inputs.allow_empty_daily || 'false' }}
        shell: bash
        run: |
          KRX_END_DATE="${INPUT_KRX_END_DATE:-$(TZ=Asia/Seoul date -d '1 day ago' +%Y%m%d)}"
          if [ -n "$INPUT_KRX_END_DATE" ]; then
            KRX_AUTO_WALKBACK_DAYS=0
          else
            KRX_AUTO_WALKBACK_DAYS="${INPUT_KRX_WALKBACK_DAYS:-5}"
          fi
          {
            echo "krx_end_date=$KRX_END_DATE"
            echo "krx_days=${INPUT_KRX_DAYS:-1}"
            echo "krx_run_id=krx_daily_${KRX_END_DATE}"
            echo "krx_auto_walkback_days=$KRX_AUTO_WALKBACK_DAYS"
            echo "krx_concurrency=${INPUT_KRX_CONCURRENCY:-2}"
            echo "krx_max_calls=${INPUT_KRX_MAX_CALLS:-40}"
            echo "krx_sleep_ms=${INPUT_KRX_SLEEP_MS:-250}"
            echo "krx_fail_threshold=${INPUT_KRX_FAIL_THRESHOLD:-0}"
          } >> "$GITHUB_OUTPUT"
          echo "FENOK_KRX_PLAN_ONLY=${INPUT_PLAN_ONLY:-false}" >> "$GITHUB_ENV"
          echo "FENOK_KRX_NO_FETCH=${INPUT_NO_FETCH:-false}" >> "$GITHUB_ENV"
          echo "FENOK_KRX_ALLOW_EMPTY_DAILY=${INPUT_ALLOW_EMPTY_DAILY:-false}" >> "$GITHUB_ENV"

      - name: Refresh KRX private daily source
        env:
          KRX_OPEN_API_AUTH_KEY: ${{ secrets.KRX_OPEN_API_AUTH_KEY }}
        shell: bash
        run: |
          ARGS=(
            "--days" "${{ steps.window.outputs.krx_days }}"
            "--concurrency" "${{ steps.window.outputs.krx_concurrency }}"
            "--max-calls" "${{ steps.window.outputs.krx_max_calls }}"
            "--sleep-ms" "${{ steps.window.outputs.krx_sleep_ms }}"
            "--fail-threshold" "${{ steps.window.outputs.krx_fail_threshold }}"
            "--scheduled-run"
          )
          if [ "${FENOK_KRX_PLAN_ONLY:-false}" = "true" ]; then ARGS+=("--plan-only"); fi
          if [ "${FENOK_KRX_NO_FETCH:-false}" = "true" ]; then ARGS+=("--no-fetch"); fi
          if [ "${FENOK_KRX_ALLOW_EMPTY_DAILY:-false}" = "true" ]; then ARGS+=("--allow-empty-daily"); fi
          BASE_END="${{ steps.window.outputs.krx_end_date }}"
          WALKBACK_DAYS="${{ steps.window.outputs.krx_auto_walkback_days }}"
          BASE_ISO="${BASE_END:0:4}-${BASE_END:4:2}-${BASE_END:6:2}"
          for offset in $(seq 0 "$WALKBACK_DAYS"); do
            CANDIDATE="$(date -u -d "${BASE_ISO} -${offset} day" +%Y%m%d)"
            RUN_ID="krx_daily_${CANDIDATE}"
            echo "Trying KRX basDd=${CANDIDATE} (offset=${offset}/${WALKBACK_DAYS})"
            if node scripts/fetch-fenok-krx-daily-private.mjs \
              "--end-date" "$CANDIDATE" \
              "--run-id" "$RUN_ID" \
              "${ARGS[@]}"; then
              echo "Resolved KRX basDd=${CANDIDATE}"
              exit 0
            fi
            echo "::warning::KRX basDd=${CANDIDATE} failed validation; trying previous date if available"
          done
          echo "KRX fetch failed for ${BASE_END} and ${WALKBACK_DAYS} walkback day(s)"
          exit 1

      - name: Commit and push KRX source evidence
        if: ${{ env.FENOK_KRX_PLAN_ONLY != 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Manifest-native staging (parity defense) plus the explicit legacy
          # hand list. Stages the admin bridge index AND the Slice 1 public-safe
          # aggregate index closes and Slice 2 KOSDAQ top-10 market-cap
          # aggregate (data/computed, mirrored; no issuer rows).
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/fenok-edge-krx-daily.yml \
            --stage always_if_exists
          git add -- data/admin/fenok-edge-korea-krx-daily-index.json
          git add -- data/computed/fenok-edge-korea-krx-index-daily.json
          git add -- data/computed/fenok-edge-korea-krx-kosdaq-market-cap-aggregate.json
          git diff --staged --quiet || git commit -m "chore: update fenok edge krx daily data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1

      - name: Dispatch manifest and RIM rebuild
        if: ${{ env.FENOK_KRX_PLAN_ONLY != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          # Origin envelope for KPI v2 authoritative-dispatch validation (contract §3).
          # slot_key = this workflow's own cron fire time (§2 canonical).
          SOURCE_EVENT: ${{ github.event_name }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          CRON="30 10 * * 1-5"
          SLOT_KEY="fenok-edge-krx-daily.yml:${CRON}@$(date -u +%Y-%m-%d)T10:30Z"
          gh workflow run update-manifest.yml --ref main \
            -f source_workflow=fenok-edge-krx-daily.yml \
            -f source_run_id="${SOURCE_RUN_ID}" \
            -f source_run_attempt="${SOURCE_RUN_ATTEMPT}" \
            -f original_event="${SOURCE_EVENT}" \
            -f slot_key="${SLOT_KEY}"
