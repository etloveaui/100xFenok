name: Fetch Damodaran Shadow Parity

on:
  schedule:
    # UTC Saturday 11:17 = KST Saturday 20:17, after the Yardeni weekly slot.
    - cron: '17 11 * * 6'
  workflow_dispatch:

permissions:
  contents: write

env:
  DAMODARAN_SHADOW_REPORT: data/admin/damodaran-shadow-parity.json

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  damodaran-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test shadow comparator and workflow contract
        run: node scripts/test-fetch-damodaran-shadow.mjs

      - name: Install converter dependencies
        continue-on-error: true
        run: python -m pip install -r scripts/lib/damodaran_shadow_converter/requirements.txt

      - name: Fetch and compare Damodaran payloads
        id: fetch_damodaran_shadow
        continue-on-error: true
        run: node scripts/fetch-damodaran-shadow.mjs

      - name: Commit parity report
        if: ${{ always() }}
        env:
          FETCH_OUTCOME: ${{ steps.fetch_damodaran_shadow.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/fetch-damodaran-shadow.yml \
            --stage always_if_exists
          if git diff --staged --quiet; then
            echo "No Damodaran shadow parity change to publish"
          else
            git commit -m "chore: update Damodaran shadow parity"
            PUBLISHED=false
            for attempt in $(seq 1 5); do
              if ! git pull --rebase --autostash origin main; then
                git rebase --abort >/dev/null 2>&1 || true
                if [[ "$attempt" == "5" ]]; then
                  exit 1
                fi
                sleep 3
                continue
              fi
              if git push; then
                PUBLISHED=true
                break
              fi
              if [[ "$attempt" == "5" ]]; then
                exit 1
              fi
              sleep 3
            done
            if [[ "$PUBLISHED" != "true" ]]; then
              exit 1
            fi
          fi
          if [[ "$FETCH_OUTCOME" != "success" ]]; then
            echo "Damodaran shadow parity reported drift or a blocked source"
            exit 1
          fi
