name: Fetch Damodaran Data

on:
  schedule:
    # UTC Saturday 11:17 = KST Saturday 20:17, after the Yardeni weekly slot.
    - cron: '17 11 * * 6'
  workflow_dispatch:

permissions:
  contents: write

env:
  DAMODARAN_SHADOW_REPORT: data/admin/damodaran/owner-guard.json

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  damodaran:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test owner guard and workflow contract
        run: node scripts/test-fetch-damodaran-shadow.mjs

      - name: Install converter dependencies
        run: python -m pip install -r scripts/lib/damodaran_shadow_converter/requirements.txt

      - name: Fetch and guard Damodaran payloads
        run: node scripts/fetch-damodaran-shadow.mjs

      - name: Preserve Damodaran guard report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: damodaran-owner-guard-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.DAMODARAN_SHADOW_REPORT }}
          if-no-files-found: ignore
          retention-days: 14

      - name: Mirror and verify Damodaran public data
        run: |
          set -euo pipefail
          for file in industries.json historical_erp.json credit_ratings.json erp.json industry_metrics.json industry_metrics_regions.json; do
            rsync -a --checksum "data/damodaran/$file" "100xfenok-next/public/data/damodaran/$file"
            cmp -s "data/damodaran/$file" "100xfenok-next/public/data/damodaran/$file"
          done

      - name: Commit guarded Damodaran data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/fetch-damodaran-shadow.yml \
            --stage required_on_success
          if git diff --staged --quiet; then
            echo "No Damodaran data change to publish"
          else
            git commit -m "chore: update Damodaran data"
            PUBLISHED=false
            for attempt in $(seq 1 5); do
              if ! git pull --rebase --autostash origin main; then
                git rebase --abort >/dev/null 2>&1 || true
                if [[ "$attempt" == "5" ]]; then
                  exit 1
                fi
                sleep 3
                continue
              fi
              if git push; then
                PUBLISHED=true
                break
              fi
              if [[ "$attempt" == "5" ]]; then
                exit 1
              fi
              sleep 3
            done
            if [[ "$PUBLISHED" != "true" ]]; then
              exit 1
            fi
          fi
