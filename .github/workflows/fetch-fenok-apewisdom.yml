name: Fetch Fenok ApeWisdom Attention Proxy

on:
  schedule:
    # Daily 13:17 UTC (22:17 KST) — off-peak, away from the top-of-hour and the
    # 22:00-23:59 UTC US-close cluster on the single fenok-data-writer queue.
    - cron: '17 13 * * *'
  workflow_dispatch:
    inputs:
      controlled_failure:
        description: 'Dispatch-only chaos: set to "transport" to force an honest provider failure shard'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-apewisdom-attention:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test ApeWisdom attention producer contracts
        run: node scripts/test-fetch-fenok-apewisdom-attention-proxy.mjs

      - name: Fetch ApeWisdom attention proxy
        id: fetch_apewisdom
        env:
          INPUT_CONTROLLED_FAILURE: ${{ github.event.inputs.controlled_failure || '' }}
        run: node scripts/fetch-fenok-apewisdom-attention-proxy.mjs

      - name: Commit and push
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_apewisdom.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Always publish the honest detection attempt shard first; then the
          # computed proxy only when the producer step reported success.
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/fetch-fenok-apewisdom.yml \
            --stage always_if_exists
          SHARD="data/admin/data-supply-state/detection-attempts/apewisdom_attention.json"
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            scripts/stage-lane-manifest.sh \
              --workflow .github/workflows/fetch-fenok-apewisdom.yml \
              --stage success_if_exists
            git add -- \
              data/computed/fenok_social_attention_proxy.json \
              data/computed/fenok_social_attention_proxy_history.json
          fi
          if git diff --staged --quiet; then
            echo "No ApeWisdom attention changes to publish"
            exit 0
          fi
          git commit -m "data: update fenok apewisdom attention proxy"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
