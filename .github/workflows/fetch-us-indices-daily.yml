name: Fetch US Index Daily Close

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-us-indices-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: '20'

      - name: Test US indices live producer
        run: npm --prefix 100xfenok-next run qa:us-indices-daily

      # Yahoo becomes the live canonical/public owner in one atomic cutover.
      # The former GAS comparator and historical report remain dormant only.
      - name: Fetch Yahoo index closes to canonical and public mirrors atomically
        id: fetch_indices
        run: node scripts/fetch-us-indices-daily.mjs

      - name: Commit live data and attempt evidence
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_indices.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          RECOVERY_EXIT=0
          if [[ "$FETCH_OUTCOME" != "success" ]]; then
            RECOVERY_EXIT=2
          fi
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/fetch-us-indices-daily.yml \
            --stage always_if_exists
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            scripts/stage-lane-manifest.sh \
              --workflow .github/workflows/fetch-us-indices-daily.yml \
              --stage success_if_exists
          fi
          if git diff --staged --quiet; then
            echo "No US indices live data or attempt evidence to publish"
            exit "$RECOVERY_EXIT"
          fi
          git commit -m "data: refresh US indices canonical and public mirrors"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit "$RECOVERY_EXIT"
            fi
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
