# SlickCharts Individual Symbols Pipeline
# Scrapes P/E, EPS, Dividend for all S&P 500 stocks
#
# Uses matrix builds for parallel execution:
# - Batch A-D: ~125 stocks
# - Batch E-L: ~125 stocks
# - Batch M-R: ~125 stocks
# - Batch S-Z: ~125 stocks
#
# Created: 2026-01-10
# Reference: docs/planning/slickcharts-data-pipeline.md
# DEC-102: Changed from 7:00 to 7:30 UTC to prevent Git Lock with weekly workflow

name: SlickCharts Symbols

on:
  schedule:
    # Weekly on Sunday at 7:30 AM UTC (30min after weekly to avoid conflict)
    - cron: '30 7 * * 0'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Which batch to scrape'
        required: false
        default: 'ALL'
        type: choice
        options:
          - ALL
          - A-D
          - E-L
          - M-R
          - S-Z
          - single
      symbol:
        description: 'Single symbol (only if batch=single)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  # Matrix build for parallel batch execution
  scrape-batch:
    if: ${{ github.event.inputs.batch != 'single' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [A-D, E-L, M-R, S-Z]

    steps:
      - name: Configure batch attempt telemetry path
        run: echo "SLICKCHARTS_ATTEMPT_EVENTS_PATH=$RUNNER_TEMP/slickcharts-symbols-${{ matrix.batch }}.jsonl" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Symbol scraper (batch ${{ matrix.batch }})
        if: ${{ github.event.inputs.batch == 'ALL' || github.event.inputs.batch == matrix.batch || github.event_name == 'schedule' }}
        run: |
          python scripts/scrapers/symbol-scraper.py \
            --batch ${{ matrix.batch }} \
            --output data/slickcharts/symbols-${{ matrix.batch }}.json \
            --pretty

      - name: Upload batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: symbols-${{ matrix.batch }}
          path: data/slickcharts/symbols-${{ matrix.batch }}.json
          retention-days: 1

      - name: Upload symbol attempt telemetry
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: attempt-symbols-${{ matrix.batch }}
          path: ${{ env.SLICKCHARTS_ATTEMPT_EVENTS_PATH }}
          if-no-files-found: ignore
          retention-days: 1

  # Merge all batches into single file
  merge-batches:
    needs: scrape-batch
    runs-on: ubuntu-latest
    if: ${{ always() && (github.event.inputs.batch == 'ALL' || github.event_name == 'schedule') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify lane-registry commit-shard contract
        run: node scripts/test-slickcharts-commit-shards.mjs

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to data folder
        run: |
          mkdir -p data/slickcharts
          mv artifacts/symbols-A-D/symbols-A-D.json data/slickcharts/
          mv artifacts/symbols-E-L/symbols-E-L.json data/slickcharts/
          mv artifacts/symbols-M-R/symbols-M-R.json data/slickcharts/
          mv artifacts/symbols-S-Z/symbols-S-Z.json data/slickcharts/

      - name: Merge batch files (cumulative)
        run: |
          python scripts/scrapers/symbol-scraper.py \
            --merge \
            data/slickcharts/symbols-A-D.json \
            data/slickcharts/symbols-E-L.json \
            data/slickcharts/symbols-M-R.json \
            data/slickcharts/symbols-S-Z.json \
            --output data/slickcharts/symbols.json \
            --cumulative

      - name: Clean up batch files
        run: |
          rm -f data/slickcharts/symbols-A-D.json
          rm -f data/slickcharts/symbols-E-L.json
          rm -f data/slickcharts/symbols-M-R.json
          rm -f data/slickcharts/symbols-S-Z.json

      - name: Emit SlickCharts symbols attempt
        if: ${{ always() }}
        run: |
          node scripts/emit-slickcharts-attempt.mjs \
            --member symbols \
            --events-root artifacts \
            --outcome "${{ needs.scrape-batch.result }}" \
            --outcome "${{ job.status }}" \
            --row "$RUNNER_TEMP/slickcharts-symbols-row.json"

      - name: Commit and push changes
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          scripts/publish-slickcharts-attempt.sh \
            symbols \
            "$RUNNER_TEMP/slickcharts-symbols-row.json" \
            "chore: update SlickCharts symbols $(date -u +%Y-%m-%d)" \
            data/slickcharts/symbols.json

  # Single symbol scraping for testing
  scrape-single:
    if: ${{ github.event.inputs.batch == 'single' && github.event.inputs.symbol != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure single-symbol attempt telemetry path
        run: echo "SLICKCHARTS_ATTEMPT_EVENTS_PATH=$RUNNER_TEMP/slickcharts-symbols-single.jsonl" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: "Run Symbol scraper (single: ${{ github.event.inputs.symbol }})"
        run: |
          python scripts/scrapers/symbol-scraper.py \
            --symbol ${{ github.event.inputs.symbol }} \
            --pretty

      - name: Emit SlickCharts symbols attempt
        if: ${{ always() }}
        run: |
          node scripts/emit-slickcharts-attempt.mjs \
            --member symbols \
            --events "$SLICKCHARTS_ATTEMPT_EVENTS_PATH" \
            --outcome "${{ job.status }}" \
            --row "$RUNNER_TEMP/slickcharts-symbols-row.json"

      - name: Commit symbols attempt
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          scripts/publish-slickcharts-attempt.sh \
            symbols \
            "$RUNNER_TEMP/slickcharts-symbols-row.json" \
            "chore: record SlickCharts symbols attempt $(date -u +%Y-%m-%d)"
