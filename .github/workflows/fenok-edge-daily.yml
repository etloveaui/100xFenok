# Fenok Edge daily derived proxy refresh.
# Raw FINRA/OCC caches stay under _private/; commits are limited to public-safe
# derived data, coverage indexes, and generated route metadata.

name: Fenok Edge Daily Data

on:
  schedule:
    # KST Tue-Sat 09:30, after the prior US session's FINRA/OCC windows.
    - cron: '30 0 * * 2-6'
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Print the resolved plan without network fetches or writes'
        required: false
        default: 'false'
      no_fetch:
        description: 'Use cached/private inputs only; do not fetch remote sources'
        required: false
        default: 'false'
      finra_from:
        description: 'Optional FINRA start date override, YYYYMMDD'
        required: false
        default: ''
      finra_to:
        description: 'Optional FINRA end date override, YYYYMMDD'
        required: false
        default: ''
      occ_batch_size:
        description: 'OCC eligible ticker batch size'
        required: false
        default: '250'
      occ_batch_count:
        description: 'OCC sequential same-run batch count'
        required: false
        default: '5'
      occ_batch_index:
        description: 'Optional OCC batch index override'
        required: false
        default: ''
      occ_max_requests:
        description: 'Maximum OCC HTTP requests per run'
        required: false
        default: '1500'
      occ_fail_threshold:
        description: 'Maximum OCC hard failures before aborting'
        required: false
        default: '25'
      occ_sleep_ms:
        description: 'Milliseconds between OCC requests'
        required: false
        default: '250'

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  refresh-fenok-edge:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify FINRA and OCC attempt emitter contracts
        run: |
          node scripts/test-data-supply-attempt-producer.mjs
          node scripts/test-fetch-fenok-finra-daily-private.mjs
          node scripts/test-fetch-fenok-finra-lkg-recovery.mjs
          node scripts/test-fetch-fenok-occ-options-volume.mjs
          node scripts/test-fetch-fenok-occ-lkg-recovery.mjs
          node scripts/test-fenok-edge-daily-attempt-workflow.mjs

      - name: Resolve bounded window
        id: window
        env:
          INPUT_PLAN_ONLY: ${{ github.event.inputs.plan_only || 'false' }}
          INPUT_NO_FETCH: ${{ github.event.inputs.no_fetch || 'false' }}
          INPUT_FINRA_FROM: ${{ github.event.inputs.finra_from || '' }}
          INPUT_FINRA_TO: ${{ github.event.inputs.finra_to || '' }}
          # Sequential same-run batches keep the 1500-request guard intact per
          # batch: 250 tickers x up to 3 candidate dates x 2 sides = 1500.
          # An explicit occ_batch_index
          # dispatch input still forces the legacy single-batch mode.
          INPUT_OCC_BATCH_SIZE: ${{ github.event.inputs.occ_batch_size || '250' }}
          INPUT_OCC_BATCH_COUNT: ${{ github.event.inputs.occ_batch_count || '5' }}
          INPUT_OCC_BATCH_INDEX: ${{ github.event.inputs.occ_batch_index || '' }}
          INPUT_OCC_MAX_REQUESTS: ${{ github.event.inputs.occ_max_requests || '1500' }}
          INPUT_OCC_FAIL_THRESHOLD: ${{ github.event.inputs.occ_fail_threshold || '25' }}
          INPUT_OCC_SLEEP_MS: ${{ github.event.inputs.occ_sleep_ms || '250' }}
        shell: bash
        run: |
          OCC_BATCH_SIZE="${INPUT_OCC_BATCH_SIZE:-375}"
          OCC_BATCH_COUNT="${INPUT_OCC_BATCH_COUNT:-3}"
          # Empty index = sequential batch-count mode (default). A dispatch-time
          # index runs exactly that one batch (debug/backfill escape hatch).
          OCC_BATCH_INDEX="${INPUT_OCC_BATCH_INDEX:-}"
          FINRA_FROM="${INPUT_FINRA_FROM:-$(date -u -d '7 days ago' +%Y%m%d)}"
          FINRA_TO="${INPUT_FINRA_TO:-$(date -u -d 'yesterday' +%Y%m%d)}"
          {
            echo "finra_from=$FINRA_FROM"
            echo "finra_to=$FINRA_TO"
            echo "occ_batch_size=$OCC_BATCH_SIZE"
            echo "occ_batch_count=$OCC_BATCH_COUNT"
            echo "occ_batch_index=$OCC_BATCH_INDEX"
            echo "occ_max_requests=${INPUT_OCC_MAX_REQUESTS:-100}"
            echo "occ_fail_threshold=${INPUT_OCC_FAIL_THRESHOLD:-5}"
            echo "occ_sleep_ms=${INPUT_OCC_SLEEP_MS:-250}"
          } >> "$GITHUB_OUTPUT"
          echo "FENOK_EDGE_PLAN_ONLY=${INPUT_PLAN_ONLY:-false}" >> "$GITHUB_ENV"
          echo "FENOK_EDGE_NO_FETCH=${INPUT_NO_FETCH:-false}" >> "$GITHUB_ENV"

      - name: Refresh FINRA and OCC derived proxies
        id: refresh_edge
        shell: bash
        env:
          # Route step outputs through env so dispatch-time inputs are never
          # interpolated directly into the shell (workflow-injection guard).
          FINRA_FROM: ${{ steps.window.outputs.finra_from }}
          FINRA_TO: ${{ steps.window.outputs.finra_to }}
          OCC_BATCH_SIZE: ${{ steps.window.outputs.occ_batch_size }}
          OCC_BATCH_COUNT: ${{ steps.window.outputs.occ_batch_count }}
          OCC_BATCH_INDEX: ${{ steps.window.outputs.occ_batch_index }}
          OCC_MAX_REQUESTS: ${{ steps.window.outputs.occ_max_requests }}
          OCC_FAIL_THRESHOLD: ${{ steps.window.outputs.occ_fail_threshold }}
          OCC_SLEEP_MS: ${{ steps.window.outputs.occ_sleep_ms }}
        run: |
          ARGS=(
            "--skip-news"
            "--finra-from" "$FINRA_FROM"
            "--finra-to" "$FINRA_TO"
            "--finra-sleep-ms" "250"
            "--flow-max-walkback-days" "14"
            "--options-all-eligible"
            "--options-batch-size" "$OCC_BATCH_SIZE"
            "--options-max-requests" "$OCC_MAX_REQUESTS"
            "--options-fail-threshold" "$OCC_FAIL_THRESHOLD"
            "--options-sleep-ms" "$OCC_SLEEP_MS"
            "--options-max-walkback-days" "2"
          )
          if [ -n "$OCC_BATCH_INDEX" ]; then
            ARGS+=("--options-batch-index" "$OCC_BATCH_INDEX")
          else
            ARGS+=("--options-batch-count" "$OCC_BATCH_COUNT")
          fi
          if [ "${FENOK_EDGE_PLAN_ONLY:-false}" = "true" ]; then ARGS+=("--dry-run"); fi
          if [ "${FENOK_EDGE_NO_FETCH:-false}" = "true" ]; then ARGS+=("--no-fetch"); fi
          node scripts/update-fenok-signal-lens-proxies.mjs "${ARGS[@]}"

      - name: Commit and push owned source artifacts
        if: ${{ always() }}
        shell: bash
        env:
          REFRESH_OUTCOME: ${{ steps.refresh_edge.outcome }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Public-safe detection attempt shards and LKG recovery state are committed
          # on every run so retry/recovery accounting survives across CI runs. FINRA
          # and OCC store freshness markers bound to their source payloads. Neither
          # recovery tree carries private raw rows.
          for SHARD in \
            data/admin/data-supply-state/detection-attempts/finra_short_volume.json \
            data/admin/data-supply-state/detection-attempts/occ_options_volume.json \
            data/admin/finra_short_volume/index.json \
            data/admin/finra_short_volume/current/regsho_daily.json \
            data/admin/finra_short_volume/lkg/regsho_daily.json \
            data/admin/occ_options_volume/index.json \
            data/admin/occ_options_volume/current/occ_options_volume.json \
            data/admin/occ_options_volume/lkg/occ_options_volume.json; do
            if [ -f "$SHARD" ]; then git add -- "$SHARD"; fi
          done
          if [ "${FENOK_EDGE_PLAN_ONLY:-false}" != "true" ] && [ "$REFRESH_OUTCOME" = "success" ]; then
            git add -- \
              data/computed/fenok_flow_proxies*.json \
              data/computed/fenok_occ_options_availability.json \
              data/computed/fenok_occ_options_volume*.json \
              data/computed/fenok_signal_lens_proxies*.json
          fi
          git diff --staged --quiet || git commit -m "chore: update fenok edge daily data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1

      - name: Dispatch manifest and RIM rebuild
        if: ${{ env.FENOK_EDGE_PLAN_ONLY != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          # Origin envelope for KPI v2 authoritative-dispatch validation (contract §3).
          # slot_key = this workflow's own cron fire time (§2 canonical).
          SOURCE_EVENT: ${{ github.event_name }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          CRON="30 0 * * 2-6"
          SLOT_KEY="fenok-edge-daily.yml:${CRON}@$(date -u +%Y-%m-%d)T00:30Z"
          gh workflow run update-manifest.yml --ref main \
            -f source_workflow=fenok-edge-daily.yml \
            -f source_run_id="${SOURCE_RUN_ID}" \
            -f source_run_attempt="${SOURCE_RUN_ATTEMPT}" \
            -f original_event="${SOURCE_EVENT}" \
            -f slot_key="${SLOT_KEY}"
