name: Fetch FRED Banking Data

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      data_type:
        description: 'Data type to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - daily
          - weekly
          - quarterly

env:
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  fetch-fred-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test FRED banking producer contracts
        run: node scripts/test-fetch-fred-banking.mjs

      - name: Fetch FRED banking data and persist one attempt
        id: fetch_banking
        env:
          DATA_TYPE: ${{ github.event.inputs.data_type || 'all' }}
        run: node scripts/fetch-fred-banking.mjs --type "$DATA_TYPE"

      - name: Commit and push owned FRED banking data
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_banking.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHARD="data/admin/data-supply-state/detection-attempts/fred_banking.json"
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            git add -- \
              data/macro/fred-banking-*.json \
              100xfenok-next/public/data/macro/fred-banking-*.json
          fi
          if git diff --staged --quiet; then
            echo "No FRED banking changes to publish"
            exit 0
          fi
          git commit -m "chore: update FRED banking data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
