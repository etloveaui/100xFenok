name: Fetch Sentiment Data

# Refreshes the dashboard and macro-monitor sentiment series that were
# previously split across manual commits / Google Apps Scripts. Merge-by-date:
# today's point is updated in place or appended; history is never overwritten.
# Per-source resilient: one source failing does not block the others.

on:
  schedule:
    # 22:00 UTC Mon-Fri = ~after US cash close (17:00/18:00 ET). CNN F&G,
    # put/call and VIX settle for the session by then; crypto updates daily.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      controlled_failure_source:
        description: 'Dispatch-only LKG chaos source (cnn, cftc, vix, move)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-sentiment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test sentiment producer contracts
        run: node scripts/test-fetch-sentiment.mjs

      - name: Fetch sentiment series
        id: fetch_sentiment
        env:
          INPUT_CONTROLLED_FAILURE_SOURCE: ${{ github.event.inputs.controlled_failure_source || '' }}
        run: node scripts/fetch-sentiment.mjs

      - name: Verify output
        if: ${{ steps.fetch_sentiment.outcome == 'success' }}
        run: |
          echo "=== Latest points (data/sentiment) ==="
          for f in cnn-fear-greed cnn-components cnn-put-call cnn-momentum cnn-strength cnn-breadth cnn-junk-bond cnn-safe-haven vix move cftc-sp500 crypto-fear-greed; do
            echo "--- $f.json ---"
            node -e "const d=require('./data/sentiment/$f.json');console.log('len',d.length,'last',JSON.stringify(d[d.length-1]))"
          done

      - name: Commit sentiment data
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_sentiment.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHARD="data/admin/data-supply-state/detection-attempts/sentiment.json"
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ -f data/admin/sentiment/index.json ]]; then
            git add -- data/admin/sentiment/index.json
          fi
          if compgen -G 'data/admin/sentiment/current/*.json' >/dev/null; then
            git add -- data/admin/sentiment/current/*.json
          fi
          if compgen -G 'data/admin/sentiment/lkg/*.json' >/dev/null; then
            git add -- data/admin/sentiment/lkg/*.json
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            git add -- data/sentiment/*.json 100xfenok-next/public/data/sentiment/*.json
          fi
          if git diff --staged --quiet; then
            echo "No sentiment changes to publish"
            exit 0
          fi
          git commit -m "chore: update sentiment data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
