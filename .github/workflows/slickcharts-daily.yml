# SlickCharts Daily Data Pipeline
# Scrapers that need daily updates with cumulative history (90 days)
#
# Scrapers: gainers, losers, treasury, currency, mortgage (5 total)
# Schedule: Daily at 6:00 AM UTC
#
# Created: 2026-01-10
# Reference: docs/planning/slickcharts-data-pipeline.md

name: SlickCharts Daily

on:
  schedule:
    # Daily at 6:00 AM UTC (after US market close + settlement)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Which scraper to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gainers
          - losers
          - treasury
          - currency
          - mortgage
      controlled_failure_files:
        description: 'Dispatch-only comma-separated chaos targets from the five daily JSON files'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  scrape-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Configure attempt telemetry path
        run: |
          echo "SLICKCHARTS_ATTEMPT_EVENTS_PATH=$RUNNER_TEMP/slickcharts-daily-attempt-events.jsonl" >> "$GITHUB_ENV"
          echo "SLICKCHARTS_DAILY_OUTCOMES_PATH=$RUNNER_TEMP/slickcharts-daily-outcomes.jsonl" >> "$GITHUB_ENV"
          echo "SLICKCHARTS_RECOVERY_SNAPSHOT_DIR=$RUNNER_TEMP/slickcharts-daily-baseline" >> "$GITHUB_ENV"
          echo "SLICKCHARTS_RECOVERY_STATUS_PATH=$RUNNER_TEMP/slickcharts-daily-recovery-status.json" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test per-file LKG recovery contracts
        run: |
          node scripts/test-producer-lkg-state.mjs
          node scripts/test-slickcharts-daily-recovery.mjs

      - name: Prepare per-file LKG baseline
        run: node scripts/slickcharts-daily-recovery.mjs prepare --snapshot-dir "$SLICKCHARTS_RECOVERY_SNAPSHOT_DIR"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      # Gainers - cumulative mode
      - name: Run Gainers scraper
        env:
          INPUT_CONTROLLED_FAILURE_FILES: ${{ inputs.controlled_failure_files || '' }}
        run: |
          node scripts/run-slickcharts-daily-key.mjs \
            --key gainers.json \
            --outcomes "$SLICKCHARTS_DAILY_OUTCOMES_PATH" \
            --event-name "${{ github.event_name }}" \
            --selected-scraper "${{ github.event.inputs.scraper || 'all' }}" \
            --controlled-failure-files "$INPUT_CONTROLLED_FAILURE_FILES" \
            -- python scripts/scrapers/gainers-scraper.py \
            --output data/slickcharts/gainers.json \
            --pretty --cumulative

      # Losers - cumulative mode
      - name: Run Losers scraper
        env:
          INPUT_CONTROLLED_FAILURE_FILES: ${{ inputs.controlled_failure_files || '' }}
        run: |
          node scripts/run-slickcharts-daily-key.mjs \
            --key losers.json \
            --outcomes "$SLICKCHARTS_DAILY_OUTCOMES_PATH" \
            --event-name "${{ github.event_name }}" \
            --selected-scraper "${{ github.event.inputs.scraper || 'all' }}" \
            --controlled-failure-files "$INPUT_CONTROLLED_FAILURE_FILES" \
            -- python scripts/scrapers/losers-scraper.py \
            --output data/slickcharts/losers.json \
            --pretty --cumulative

      # Treasury rates - cumulative mode
      - name: Run Treasury scraper
        env:
          INPUT_CONTROLLED_FAILURE_FILES: ${{ inputs.controlled_failure_files || '' }}
        run: |
          node scripts/run-slickcharts-daily-key.mjs \
            --key treasury.json \
            --outcomes "$SLICKCHARTS_DAILY_OUTCOMES_PATH" \
            --event-name "${{ github.event_name }}" \
            --selected-scraper "${{ github.event.inputs.scraper || 'all' }}" \
            --controlled-failure-files "$INPUT_CONTROLLED_FAILURE_FILES" \
            -- python scripts/scrapers/treasury-scraper.py \
            --output data/slickcharts/treasury.json \
            --pretty --cumulative

      # Crypto currency - cumulative mode
      - name: Run Currency scraper
        env:
          INPUT_CONTROLLED_FAILURE_FILES: ${{ inputs.controlled_failure_files || '' }}
        run: |
          node scripts/run-slickcharts-daily-key.mjs \
            --key currency.json \
            --outcomes "$SLICKCHARTS_DAILY_OUTCOMES_PATH" \
            --event-name "${{ github.event_name }}" \
            --selected-scraper "${{ github.event.inputs.scraper || 'all' }}" \
            --controlled-failure-files "$INPUT_CONTROLLED_FAILURE_FILES" \
            -- python scripts/scrapers/currency-scraper.py \
            --output data/slickcharts/currency.json \
            --pretty --cumulative

      # Mortgage rates - cumulative mode
      - name: Run Mortgage scraper
        env:
          INPUT_CONTROLLED_FAILURE_FILES: ${{ inputs.controlled_failure_files || '' }}
        run: |
          node scripts/run-slickcharts-daily-key.mjs \
            --key mortgage.json \
            --outcomes "$SLICKCHARTS_DAILY_OUTCOMES_PATH" \
            --event-name "${{ github.event_name }}" \
            --selected-scraper "${{ github.event.inputs.scraper || 'all' }}" \
            --controlled-failure-files "$INPUT_CONTROLLED_FAILURE_FILES" \
            -- python scripts/scrapers/mortgage-scraper.py \
            --output data/slickcharts/mortgage.json \
            --pretty --cumulative

      - name: Finalize per-file LKG recovery
        if: ${{ always() }}
        run: |
          node scripts/slickcharts-daily-recovery.mjs finalize \
            --snapshot-dir "$SLICKCHARTS_RECOVERY_SNAPSHOT_DIR" \
            --outcomes "$SLICKCHARTS_DAILY_OUTCOMES_PATH" \
            --status "$SLICKCHARTS_RECOVERY_STATUS_PATH" \
            --selected-scraper "${{ github.event.inputs.scraper || 'all' }}" \
            --job-status "${{ job.status }}"

      - name: Emit SlickCharts daily attempt
        if: ${{ always() }}
        run: |
          node scripts/emit-slickcharts-attempt.mjs \
            --member daily \
            --events "$SLICKCHARTS_ATTEMPT_EVENTS_PATH" \
            --outcomes-file "$SLICKCHARTS_DAILY_OUTCOMES_PATH" \
            --outcome "${{ job.status }}" \
            --row "$RUNNER_TEMP/slickcharts-daily-row.json"

      - name: Commit and push changes
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          scripts/publish-slickcharts-attempt.sh \
            daily \
            "$RUNNER_TEMP/slickcharts-daily-row.json" \
            "chore: update SlickCharts daily data $(date -u +%Y-%m-%d)" \
            data/slickcharts/gainers.json \
            data/slickcharts/losers.json \
            data/slickcharts/treasury.json \
            data/slickcharts/currency.json \
            data/slickcharts/mortgage.json
