# SlickCharts Daily Data Pipeline
# Scrapers that need daily updates with cumulative history (90 days)
#
# Scrapers: gainers, losers, treasury, currency, mortgage (5 total)
# Schedule: Daily at 6:00 AM UTC
#
# Created: 2026-01-10
# Reference: docs/planning/slickcharts-data-pipeline.md

name: SlickCharts Daily

on:
  schedule:
    # Daily at 6:00 AM UTC (after US market close + settlement)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Which scraper to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gainers
          - losers
          - treasury
          - currency
          - mortgage

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      # Gainers - cumulative mode
      - name: Run Gainers scraper
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'gainers' || github.event_name == 'schedule' }}
        run: |
          python scripts/scrapers/gainers-scraper.py \
            --output data/slickcharts/gainers.json \
            --pretty --cumulative

      # Losers - cumulative mode
      - name: Run Losers scraper
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'losers' || github.event_name == 'schedule' }}
        run: |
          python scripts/scrapers/losers-scraper.py \
            --output data/slickcharts/losers.json \
            --pretty --cumulative

      # Treasury rates - cumulative mode
      - name: Run Treasury scraper
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'treasury' || github.event_name == 'schedule' }}
        run: |
          python scripts/scrapers/treasury-scraper.py \
            --output data/slickcharts/treasury.json \
            --pretty --cumulative

      # Crypto currency - cumulative mode
      - name: Run Currency scraper
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'currency' || github.event_name == 'schedule' }}
        run: |
          python scripts/scrapers/currency-scraper.py \
            --output data/slickcharts/currency.json \
            --pretty --cumulative

      # Mortgage rates - cumulative mode
      - name: Run Mortgage scraper
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'mortgage' || github.event_name == 'schedule' }}
        run: |
          python scripts/scrapers/mortgage-scraper.py \
            --output data/slickcharts/mortgage.json \
            --pretty --cumulative

      - name: Build Explore discovery summary
        run: node scripts/build-slickcharts-discovery.mjs

      - name: Sync public mirror
        run: |
          mkdir -p 100xfenok-next/public/data/slickcharts
          rsync -a data/slickcharts/ 100xfenok-next/public/data/slickcharts/

      - name: Rebuild Fenok derived gates
        run: |
          node scripts/write-fenok-s1-stock-public-promotion-dry-run.mjs --check
          npm --prefix 100xfenok-next run sync-static
          npm --prefix 100xfenok-next run qa:fenok-edge-readiness
          npm --prefix 100xfenok-next run qa:fenok-s0-daily-gated

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A \
            data/slickcharts/ \
            data/computed/fenok_signals*.json \
            data/computed/stock_action_index.json \
            data/computed/fenok_signal_lens_proxies*.json \
            data/admin/fenok-edge-coverage-index.json \
            data/admin/fenok-s1-stock-public-promotion-dry-run.json \
            100xfenok-next/public/data/slickcharts/ \
            100xfenok-next/public/data/computed/fenok_signals_summary.json \
            100xfenok-next/public/data/computed/stock_action_index.json \
            100xfenok-next/public/data/admin/fenok-edge-coverage-index.json \
            100xfenok-next/src/generated/static-route-manifest.ts
          git diff --staged --quiet || git commit -m "chore: update SlickCharts daily data $(date -u +%Y-%m-%d)"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
