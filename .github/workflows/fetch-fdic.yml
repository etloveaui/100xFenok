# FDIC Tier1 Capital Ratio collection with current-attempt evidence.

name: Fetch FDIC Tier1 Data

on:
  schedule:
    - cron: '0 6 1-7 * 1'
  workflow_dispatch:
    inputs:
      controlled_failure_key:
        description: 'Dispatch-only chaos key (latest or an owned quarter)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-fdic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test FDIC Tier1 producer contracts
        run: node scripts/test-fetch-fdic-tier1.mjs

      - name: Fetch FDIC Tier1 data and persist attempt evidence
        id: fetch_fdic
        env:
          INPUT_CONTROLLED_FAILURE_KEY: ${{ github.event.inputs.controlled_failure_key || '' }}
        run: node scripts/fetch-fdic-tier1.mjs

      - name: Verify output
        if: ${{ steps.fetch_fdic.outcome == 'success' }}
        run: |
          head -20 data/macro/fdic-tier1.json
          echo "Total lines: $(wc -l < data/macro/fdic-tier1.json)"

      - name: Commit and push
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_fdic.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHARD="data/admin/data-supply-state/detection-attempts/fdic_tier1.json"
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ -f data/admin/fdic_tier1/index.json ]]; then
            git add -- data/admin/fdic_tier1/index.json
          fi
          if [[ -f data/admin/fdic_tier1/lkg/fdic_tier1.json ]]; then
            git add -- data/admin/fdic_tier1/lkg/fdic_tier1.json
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            git add -- data/macro/fdic-tier1.json 100xfenok-next/public/data/macro/fdic-tier1.json
          fi
          if git diff --staged --quiet; then
            echo "No FDIC Tier1 changes to publish"
            exit 0
          fi
          git commit -m "chore: update FDIC Tier1 data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
