# yf Finance Engine v2 — bounded Yahoo Finance depth for the stock lens.
# Weekly cron + manual dispatch with profile/limit/shard for staged rollout.
# Output: data/yf/finance/{TICKER}.json + public mirror.

name: Fetch YF Finance Data

on:
  schedule:
    # 매주 토요일 22:00 UTC (한국 일요일 07:00) — scouter weekly 주기와 정합
    - cron: '0 22 * * 6'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Ticker limit (empty = full universe)'
        required: false
        default: ''
      shard:
        description: 'Shard i/n (e.g. 0/4, empty = no shard)'
        required: false
        default: ''
      tickers:
        description: 'Comma-separated ticker override (e.g. TQQQ,SOXL,NVDL)'
        required: false
        default: ''
      sleep:
        description: 'Seconds between tickers'
        required: false
        default: '0.8'
      profile:
        description: 'Fetch profile: core, full, or etf'
        required: false
        default: 'full'
      max_age_hours:
        description: 'Skip usable local payloads newer than N hours (0 = disabled)'
        required: false
        default: '0'
      include_options:
        description: 'Fetch first option expiries (targeted runs only)'
        required: false
        default: 'false'
      include_shares_full:
        description: 'Fetch share-count history sample'
        required: false
        default: 'false'
      stockanalysis_etfs:
        description: 'Include full StockAnalysis ETF universe in the candidate set'
        required: false
        default: 'false'
      history_gaps_only:
        description: 'Fetch only tickers missing enough local 1Y history rows'
        required: false
        default: 'false'
      history_min_rows:
        description: 'Minimum local history_1y rows before a ticker is skipped'
        required: false
        default: '200'
      plan_only:
        description: 'Resolve and print the candidate plan without Yahoo calls or data writes'
        required: false
        default: 'false'

jobs:
  fetch-yf-finance:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: pip install yfinance

      - name: Run batch fetch
        env:
          INPUT_LIMIT: ${{ github.event.inputs.limit || '' }}
          INPUT_SHARD: ${{ github.event.inputs.shard || '' }}
          INPUT_TICKERS: ${{ github.event.inputs.tickers || '' }}
          INPUT_SLEEP: ${{ github.event.inputs.sleep || '0.8' }}
          INPUT_PROFILE: ${{ github.event.inputs.profile || 'full' }}
          INPUT_MAX_AGE_HOURS: ${{ github.event.inputs.max_age_hours || '0' }}
          INPUT_INCLUDE_OPTIONS: ${{ github.event.inputs.include_options || 'false' }}
          INPUT_INCLUDE_SHARES_FULL: ${{ github.event.inputs.include_shares_full || 'false' }}
          INPUT_STOCKANALYSIS_ETFS: ${{ github.event.inputs.stockanalysis_etfs || 'false' }}
          INPUT_HISTORY_GAPS_ONLY: ${{ github.event.inputs.history_gaps_only || 'false' }}
          INPUT_HISTORY_MIN_ROWS: ${{ github.event.inputs.history_min_rows || '200' }}
          INPUT_PLAN_ONLY: ${{ github.event.inputs.plan_only || 'false' }}
        run: |
          echo "YF_PLAN_ONLY=${INPUT_PLAN_ONLY:-false}" >> "$GITHUB_ENV"
          ARGS="--profile ${INPUT_PROFILE:-full} --max-age-hours ${INPUT_MAX_AGE_HOURS:-0}"
          if [ -n "$INPUT_LIMIT" ]; then ARGS="$ARGS --limit $INPUT_LIMIT"; fi
          if [ -n "$INPUT_SHARD" ]; then ARGS="$ARGS --shard $INPUT_SHARD"; fi
          if [ -n "$INPUT_TICKERS" ]; then ARGS="$ARGS --tickers $INPUT_TICKERS"; fi
          if [ "$INPUT_INCLUDE_OPTIONS" = "true" ]; then ARGS="$ARGS --include-options"; fi
          if [ "$INPUT_INCLUDE_SHARES_FULL" = "true" ]; then ARGS="$ARGS --include-shares-full"; fi
          if [ "$INPUT_STOCKANALYSIS_ETFS" = "true" ]; then ARGS="$ARGS --stockanalysis-etfs"; fi
          if [ "$INPUT_HISTORY_GAPS_ONLY" = "true" ]; then ARGS="$ARGS --history-gaps-only --history-min-rows ${INPUT_HISTORY_MIN_ROWS:-200}"; fi
          if [ "$INPUT_PLAN_ONLY" = "true" ]; then ARGS="$ARGS --plan-only"; fi
          python3 scripts/fetch-yf-finance.py $ARGS --sleep "${INPUT_SLEEP:-0.8}"

      - name: Rebuild local coverage summary
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: python3 scripts/rebuild-yf-finance-summary.py

      - name: Build quarter-end close snapshot
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: python3 scripts/build-quarter-closes.py

      - name: Build normalized market facts
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: python3 scripts/build-market-facts.py

      - name: Build market source parity
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: python3 scripts/build-market-source-parity.py

      - name: Build market data audit
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: python3 scripts/audit-market-data.py --output data/computed/market_data_audit.json --mirror-public

      - name: Mirror to public
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: |
          mkdir -p 100xfenok-next/public/data/yf/finance
          cp -r data/yf/finance/. 100xfenok-next/public/data/yf/finance/
          cp data/yf/quarter_closes.json 100xfenok-next/public/data/yf/quarter_closes.json

      - name: Update manifest
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: python3 scripts/update-manifest.py

      - name: Validate YF and market audit contracts
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: |
          python3 -m unittest scripts/test_fetch_yf_finance_selection.py
          python3 -m unittest scripts/test_audit_market_data.py
          npm --prefix 100xfenok-next run qa:market-audit
          npm --prefix 100xfenok-next run qa:copy

      - name: Commit and push
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/yf data/computed/market_facts data/computed/market_source_parity.json data/computed/market_data_audit.json data/manifest.json 100xfenok-next/public/data/yf 100xfenok-next/public/data/computed/market_facts 100xfenok-next/public/data/computed/market_source_parity.json 100xfenok-next/public/data/computed/market_data_audit.json 100xfenok-next/public/data/manifest.json
          git diff --staged --quiet || git commit -m "chore: update yf finance data"
          git pull --rebase origin main
          git push
