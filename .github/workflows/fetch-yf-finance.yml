# yf Finance Engine v2 — bounded Yahoo Finance depth for the stock lens.
# Daily measured-stock refresh + bounded six-day ETF shard cycle.
# Output: owned canonical Yahoo data. Update Manifest owns shared/public projections.

name: Fetch YF Finance Data

on:
  schedule:
    # Weekday measured-stock refresh after US close (KST Tue-Sat 08:20).
    - cron: '20 23 * * 1-5'
    # Sunday-Friday 22:00 UTC: explicit schedule keys bind one stable ETF shard per day.
    - cron: '0 22 * * 0'
    - cron: '0 22 * * 1'
    - cron: '0 22 * * 2'
    - cron: '0 22 * * 3'
    - cron: '0 22 * * 4'
    - cron: '0 22 * * 5'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Ticker limit (empty = full universe)'
        required: false
        default: ''
      shard:
        description: 'Shard i/n (e.g. 0/4, empty = no shard)'
        required: false
        default: ''
      daily_all_shards:
        description: 'Run every daily stock shard in one dispatch'
        required: false
        default: 'false'
      daily_stock_shards:
        description: 'Daily stock shard count when daily_all_shards=true'
        required: false
        default: '5'
      tickers:
        description: 'Comma-separated ticker override (e.g. TQQQ,SOXL,NVDL)'
        required: false
        default: ''
      controlled_failure_tickers:
        description: 'Owner-approved failure proof; must be a subset of tickers and is rejected on schedules'
        required: false
        default: ''
      sleep:
        description: 'Seconds between tickers'
        required: false
        default: '0.8'
      ticker_timeout:
        description: 'Seconds per ticker attempt before retry/skip (0 = disabled)'
        required: false
        default: '90'
      retries:
        description: 'Retry attempts per ticker after the first attempt'
        required: false
        default: '2'
      merge_existing:
        description: 'Merge fetched non-null fields into existing payloads'
        required: false
        default: 'false'
      profile:
        description: 'Fetch profile: daily, core, full, or etf'
        required: false
        default: 'full'
      max_age_hours:
        description: 'Skip usable local payloads newer than N hours (0 = disabled)'
        required: false
        default: '0'
      include_options:
        description: 'Fetch first option expiries (targeted runs only)'
        required: false
        default: 'false'
      include_shares_full:
        description: 'Fetch share-count history sample'
        required: false
        default: 'false'
      stockanalysis_etfs:
        description: 'Include full StockAnalysis ETF universe in the candidate set'
        required: false
        default: 'false'
      stocks_only:
        description: 'Use only the measured stock universe, excluding ETF candidates'
        required: false
        default: 'false'
      history_gaps_only:
        description: 'Fetch only tickers missing enough local 1Y history rows'
        required: false
        default: 'false'
      history_min_rows:
        description: 'Minimum local history_1y rows before a ticker is skipped'
        required: false
        default: '200'
      plan_only:
        description: 'Resolve and print the candidate plan without Yahoo calls or data writes'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  fetch-yf-finance:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yfinance
        run: pip install yfinance

      - name: Run batch fetch
        id: fetch_batch
        env:
          INPUT_LIMIT: ${{ github.event.inputs.limit || '' }}
          INPUT_SHARD: ${{ github.event.inputs.shard || '' }}
          INPUT_DAILY_ALL_SHARDS: ${{ github.event.inputs.daily_all_shards || 'false' }}
          INPUT_DAILY_STOCK_SHARDS: ${{ github.event.inputs.daily_stock_shards || '5' }}
          INPUT_TICKERS: ${{ github.event.inputs.tickers || '' }}
          INPUT_CONTROLLED_FAILURE_TICKERS: ${{ github.event.inputs.controlled_failure_tickers || '' }}
          INPUT_SLEEP: ${{ github.event.inputs.sleep || '0.8' }}
          INPUT_TICKER_TIMEOUT: ${{ github.event.inputs.ticker_timeout || '90' }}
          INPUT_RETRIES: ${{ github.event.inputs.retries || '2' }}
          INPUT_MERGE_EXISTING: ${{ github.event.inputs.merge_existing || 'false' }}
          INPUT_PROFILE: ${{ github.event.inputs.profile || 'full' }}
          INPUT_MAX_AGE_HOURS: ${{ github.event.inputs.max_age_hours || '0' }}
          INPUT_INCLUDE_OPTIONS: ${{ github.event.inputs.include_options || 'false' }}
          INPUT_INCLUDE_SHARES_FULL: ${{ github.event.inputs.include_shares_full || 'false' }}
          INPUT_STOCKANALYSIS_ETFS: ${{ github.event.inputs.stockanalysis_etfs || 'false' }}
          INPUT_STOCKS_ONLY: ${{ github.event.inputs.stocks_only || 'false' }}
          INPUT_HISTORY_GAPS_ONLY: ${{ github.event.inputs.history_gaps_only || 'false' }}
          INPUT_HISTORY_MIN_ROWS: ${{ github.event.inputs.history_min_rows || '200' }}
          INPUT_PLAN_ONLY: ${{ github.event.inputs.plan_only || 'false' }}
          INPUT_RETRY_LIMIT: ''
          INPUT_REGULAR_LIMIT: ''
          INPUT_SHARD_CYCLE_INDEX: ''
          INPUT_SCHEDULED_WEEKDAY: ''
          INPUT_STABLE_SHARDS: 'false'
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            if [ "$EVENT_SCHEDULE" = "20 23 * * 1-5" ]; then
              INPUT_DAILY_STOCK_SHARDS="${YF_DAILY_STOCK_SHARDS:-5}"
              INPUT_DAILY_ALL_SHARDS="${YF_DAILY_STOCK_ALL_SHARDS:-true}"
              # Default to full coverage across all daily stock shards. A cap
              # must be an explicit operator override so a larger future active
              # universe cannot silently fall outside daily freshness.
              INPUT_LIMIT="${YF_DAILY_STOCK_LIMIT:-}"
              INPUT_SHARD="${YF_DAILY_STOCK_SHARD:-}"
              INPUT_SLEEP="${YF_DAILY_STOCK_SLEEP:-0.35}"
              INPUT_TICKER_TIMEOUT="${YF_DAILY_STOCK_TICKER_TIMEOUT:-45}"
              INPUT_RETRIES="${YF_DAILY_STOCK_RETRIES:-1}"
              INPUT_MERGE_EXISTING="${YF_DAILY_STOCK_MERGE_EXISTING:-true}"
              INPUT_PROFILE="${YF_DAILY_STOCK_PROFILE:-daily}"
              INPUT_MAX_AGE_HOURS="${YF_DAILY_STOCK_MAX_AGE_HOURS:-18}"
              INPUT_HISTORY_GAPS_ONLY="false"
              INPUT_HISTORY_MIN_ROWS="${YF_DAILY_STOCK_HISTORY_MIN_ROWS:-200}"
              INPUT_STOCKANALYSIS_ETFS="false"
              INPUT_STOCKS_ONLY="true"
            else
              case "$EVENT_SCHEDULE" in
                '0 22 * * 0') DAILY_INDEX=0 ;;
                '0 22 * * 1') DAILY_INDEX=1 ;;
                '0 22 * * 2') DAILY_INDEX=2 ;;
                '0 22 * * 3') DAILY_INDEX=3 ;;
                '0 22 * * 4') DAILY_INDEX=4 ;;
                '0 22 * * 5') DAILY_INDEX=5 ;;
                *) echo "::error::unrecognized scheduled ETF slot: $EVENT_SCHEDULE" >&2; exit 2 ;;
              esac
              DAILY_SHARDS=6
              INPUT_LIMIT="${YF_WEEKLY_ETF_LIMIT:-140}"
              INPUT_RETRY_LIMIT="${YF_WEEKLY_ETF_RETRY_LIMIT:-40}"
              INPUT_REGULAR_LIMIT="${YF_WEEKLY_ETF_REGULAR_LIMIT:-100}"
              INPUT_SHARD_CYCLE_INDEX="${YF_WEEKLY_ETF_SHARD_CYCLE_INDEX:-}"
              INPUT_SCHEDULED_WEEKDAY="$DAILY_INDEX"
              INPUT_STABLE_SHARDS="true"
              INPUT_SHARD="${DAILY_INDEX}/${DAILY_SHARDS}"
              INPUT_SLEEP="${YF_WEEKLY_ETF_SLEEP:-1.0}"
              INPUT_TICKER_TIMEOUT="${YF_WEEKLY_ETF_TICKER_TIMEOUT:-90}"
              INPUT_RETRIES="${YF_WEEKLY_ETF_RETRIES:-1}"
              INPUT_MERGE_EXISTING="${YF_WEEKLY_ETF_MERGE_EXISTING:-false}"
              INPUT_PROFILE="${YF_WEEKLY_ETF_PROFILE:-etf}"
              INPUT_MAX_AGE_HOURS="${YF_WEEKLY_ETF_MAX_AGE_HOURS:-18}"
              INPUT_HISTORY_GAPS_ONLY="${YF_WEEKLY_ETF_HISTORY_GAPS_ONLY:-true}"
              INPUT_HISTORY_MIN_ROWS="${YF_WEEKLY_ETF_HISTORY_MIN_ROWS:-200}"
              INPUT_STOCKANALYSIS_ETFS="${YF_WEEKLY_ETF_STOCKANALYSIS_ETFS:-true}"
              INPUT_STOCKS_ONLY="false"
            fi
            INPUT_INCLUDE_OPTIONS="false"
            INPUT_INCLUDE_SHARES_FULL="false"
            INPUT_PLAN_ONLY="false"
          fi
          echo "YF_PLAN_ONLY=${INPUT_PLAN_ONLY:-false}" >> "$GITHUB_ENV"
          ARGS="--profile ${INPUT_PROFILE:-full} --max-age-hours ${INPUT_MAX_AGE_HOURS:-0} --record-batch-state --run-id ${GITHUB_RUN_ID} --run-attempt ${GITHUB_RUN_ATTEMPT}"
          if [ "$EVENT_NAME" = "schedule" ]; then ARGS="$ARGS --natural-run"; fi
          if [ -n "$INPUT_LIMIT" ]; then ARGS="$ARGS --limit $INPUT_LIMIT"; fi
          if [ -n "$INPUT_RETRY_LIMIT" ]; then ARGS="$ARGS --retry-limit $INPUT_RETRY_LIMIT"; fi
          if [ -n "$INPUT_REGULAR_LIMIT" ]; then ARGS="$ARGS --regular-limit $INPUT_REGULAR_LIMIT"; fi
          if [ -n "$INPUT_SHARD_CYCLE_INDEX" ]; then ARGS="$ARGS --shard-cycle-index $INPUT_SHARD_CYCLE_INDEX"; fi
          if [ -n "$INPUT_SCHEDULED_WEEKDAY" ]; then ARGS="$ARGS --scheduled-weekday $INPUT_SCHEDULED_WEEKDAY"; fi
          if [ "$INPUT_STABLE_SHARDS" = "true" ]; then ARGS="$ARGS --stable-shards"; fi
          if [ -n "$INPUT_SHARD" ]; then ARGS="$ARGS --shard $INPUT_SHARD"; fi
          if [ -n "$INPUT_TICKERS" ]; then ARGS="$ARGS --tickers $INPUT_TICKERS"; fi
          if [ -n "$INPUT_CONTROLLED_FAILURE_TICKERS" ]; then ARGS="$ARGS --controlled-failure-tickers $INPUT_CONTROLLED_FAILURE_TICKERS"; fi
          if [ "$INPUT_STOCKS_ONLY" = "true" ]; then ARGS="$ARGS --stocks-only"; fi
          if [ "$INPUT_INCLUDE_OPTIONS" = "true" ]; then ARGS="$ARGS --include-options"; fi
          if [ "$INPUT_INCLUDE_SHARES_FULL" = "true" ]; then ARGS="$ARGS --include-shares-full"; fi
          if [ "$INPUT_STOCKANALYSIS_ETFS" = "true" ]; then ARGS="$ARGS --stockanalysis-etfs"; fi
          if [ "$INPUT_HISTORY_GAPS_ONLY" = "true" ]; then ARGS="$ARGS --history-gaps-only --history-min-rows ${INPUT_HISTORY_MIN_ROWS:-200}"; fi
          if [ "$INPUT_MERGE_EXISTING" = "true" ]; then ARGS="$ARGS --merge-existing"; fi
          if [ "$INPUT_PLAN_ONLY" = "true" ]; then ARGS="$ARGS --plan-only"; fi
          if [ "${INPUT_DAILY_ALL_SHARDS:-false}" = "true" ] && [ -z "$INPUT_SHARD" ]; then
            DAILY_STOCK_SHARDS="${INPUT_DAILY_STOCK_SHARDS:-5}"
            echo "Running all daily stock shards: ${DAILY_STOCK_SHARDS}"
            for shard_index in $(seq 0 $((DAILY_STOCK_SHARDS - 1))); do
              echo "::group::YF daily stock shard ${shard_index}/${DAILY_STOCK_SHARDS}"
              python3 scripts/fetch-yf-finance.py $ARGS --all-shards-run --shard "${shard_index}/${DAILY_STOCK_SHARDS}" --sleep "${INPUT_SLEEP:-0.8}" --ticker-timeout "${INPUT_TICKER_TIMEOUT:-90}" --retries "${INPUT_RETRIES:-2}"
              echo "::endgroup::"
            done
          else
            if [ -n "$INPUT_SHARD" ]; then ARGS="$ARGS --shard $INPUT_SHARD"; fi
            python3 scripts/fetch-yf-finance.py $ARGS --sleep "${INPUT_SLEEP:-0.8}" --ticker-timeout "${INPUT_TICKER_TIMEOUT:-90}" --retries "${INPUT_RETRIES:-2}"
          fi

      - name: Refresh owned Yahoo quarter-close source
        id: quarter_closes
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        run: |
          python3 scripts/build-quarter-closes.py
          mkdir -p 100xfenok-next/public/data/yf
          cp data/yf/quarter_closes.json 100xfenok-next/public/data/yf/quarter_closes.json

      - name: Persist fetched Yahoo source data
        id: persist_yahoo_state
        if: ${{ always() && env.YF_PLAN_ONLY != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- \
            data/yf/finance \
            data/yf/quarter_closes.json \
            data/admin/yahoo-batch-quote-history \
            100xfenok-next/public/data/yf/quarter_closes.json
          git restore --staged --worktree -- data/yf/finance/_summary.json
          if git diff --staged --quiet; then
            echo "No fetched Yahoo candidate changes to persist"
            echo "persisted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "data: persist yf finance candidates"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "candidate rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              echo "persisted=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "candidate push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "candidate push failed after retrying concurrent main updates"
          exit 1

      - name: Publish failed Yahoo attempt evidence
        if: ${{ always() && env.YF_PLAN_ONLY != 'true' && (steps.fetch_batch.outcome == 'failure' || steps.quarter_closes.outcome == 'failure') && steps.persist_yahoo_state.outcome == 'success' && steps.persist_yahoo_state.outputs.persisted == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-manifest.yml --ref main

      - name: Dispatch shared projection rebuild
        if: ${{ env.YF_PLAN_ONLY != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-manifest.yml --ref main
