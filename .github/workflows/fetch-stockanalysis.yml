# StockAnalysis DataPack source refresh.
# Output: data/stockanalysis/** + public mirror + manifest.

name: Fetch StockAnalysis Data

on:
  schedule:
    # Weekday scored-ETF daily 1Y continuity catch-up (KST Tue-Sat 07:50).
    - cron: '50 22 * * 1-5'
    # Weekday bounded ETF/surface catch-up after US close (KST Tue-Sat 08:50).
    - cron: '50 23 * * 1-5'
    # 매주 일요일 23:20 UTC (한국 월요일 08:20) — Yahoo weekly refresh afterglow
    - cron: '20 23 * * 0'
  workflow_dispatch:
    inputs:
      etfs:
        description: 'Comma-separated ETF override (empty = focus ETF list)'
        required: false
        default: ''
      stocks:
        description: 'Comma-separated stock symbols'
        required: false
        default: ''
      fetch_financials:
        description: 'Fetch stock financial statements for the stock focus set'
        required: false
        default: 'true'
      discover_universe:
        description: 'Refresh the full StockAnalysis ETF universe list'
        required: false
        default: 'true'
      universe_backfill:
        description: 'Deep-fetch ETF payloads from the universe list (manual chunked runs only)'
        required: false
        default: 'false'
      incremental_etf_backfill:
        description: 'Auto-fetch new/missing/stale ETF details without a full universe run'
        required: false
        default: 'true'
      incremental_etf_limit:
        description: 'Maximum incremental ETF detail retries per run'
        required: false
        default: '120'
      incremental_etf_max_age_hours:
        description: 'Existing StockAnalysis ETF detail age before stale retry'
        required: false
        default: '720'
      reconcile_missing_etf_details:
        description: 'Classify and close missing ETF details; only provider HTTP 400/404 remains a named coverage gap'
        required: false
        default: 'false'
      reconcile_missing_etf_limit:
        description: 'Maximum missing ETF details to reconcile (0 = all)'
        required: false
        default: '0'
      history_gap_plan:
        description: 'Write a no-network ETF multi-year history gap plan only'
        required: false
        default: 'false'
      core_basket_refresh:
        description: 'Refresh exact ETF Core Daily Basket tickers from data/admin/fenok-etf-core-daily-basket.json'
        required: false
        default: 'false'
      history_gaps_only:
        description: 'With incremental ETF backfill, fetch only ETF details missing required history periods'
        required: false
        default: 'false'
      required_history_periods:
        description: 'Comma-separated history periods required for history gap selection'
        required: false
        default: 'monthly_3y,monthly_5y'
      yf_etf_fallback:
        description: 'Use Yahoo ETF/fund fallback when StockAnalysis ETF detail endpoints are 404'
        required: false
        default: 'true'
      fetch_surfaces:
        description: 'Refresh high-value StockAnalysis public table/devalue surfaces'
        required: false
        default: 'true'
      surface_set:
        description: 'Surface bundle: core, events, movers, industry, etf'
        required: false
        default: 'core'
      surfaces:
        description: 'Comma-separated surface override'
        required: false
        default: ''
      offset:
        description: 'ETF offset for universe backfill chunking'
        required: false
        default: '0'
      limit_etfs:
        description: 'ETF limit for smoke/backfill runs'
        required: false
        default: ''
      max_universe_pages:
        description: 'Maximum ETF universe list pages to scan'
        required: false
        default: '100'
      sleep:
        description: 'Seconds between requests'
        required: false
        default: '0.25'

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  fetch-stockanalysis:
    runs-on: ubuntu-latest
    # 60 was structurally too short for post-outage catch-up: 261 rate-limited
    # ETF fetches x ~20s ≈ 87min, so the job died before its commit step and
    # the backlog could never drain (run 29117945172 cancelled at 60m, 171/261
    # done, zero committed). YF lane precedent is 240.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install optional Yahoo fallback dependency
        run: pip install yfinance

      - name: Run StockAnalysis fetch
        env:
          INPUT_ETFS: ${{ github.event.inputs.etfs }}
          INPUT_STOCKS: ${{ github.event.inputs.stocks }}
          INPUT_FETCH_FINANCIALS: ${{ github.event.inputs.fetch_financials }}
          INPUT_DISCOVER_UNIVERSE: ${{ github.event.inputs.discover_universe }}
          INPUT_UNIVERSE_BACKFILL: ${{ github.event.inputs.universe_backfill }}
          INPUT_INCREMENTAL_ETF_BACKFILL: ${{ github.event.inputs.incremental_etf_backfill }}
          INPUT_INCREMENTAL_ETF_LIMIT: ${{ github.event.inputs.incremental_etf_limit }}
          INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS: ${{ github.event.inputs.incremental_etf_max_age_hours }}
          INPUT_RECONCILE_MISSING_ETF_DETAILS: ${{ github.event.inputs.reconcile_missing_etf_details }}
          INPUT_RECONCILE_MISSING_ETF_LIMIT: ${{ github.event.inputs.reconcile_missing_etf_limit }}
          INPUT_HISTORY_GAP_PLAN: ${{ github.event.inputs.history_gap_plan }}
          INPUT_CORE_BASKET_REFRESH: ${{ github.event.inputs.core_basket_refresh }}
          INPUT_HISTORY_GAPS_ONLY: ${{ github.event.inputs.history_gaps_only }}
          INPUT_REQUIRED_HISTORY_PERIODS: ${{ github.event.inputs.required_history_periods }}
          INPUT_YF_ETF_FALLBACK: ${{ github.event.inputs.yf_etf_fallback }}
          INPUT_FETCH_SURFACES: ${{ github.event.inputs.fetch_surfaces }}
          INPUT_SURFACE_SET: ${{ github.event.inputs.surface_set }}
          INPUT_SURFACES: ${{ github.event.inputs.surfaces }}
          INPUT_OFFSET: ${{ github.event.inputs.offset }}
          INPUT_LIMIT_ETFS: ${{ github.event.inputs.limit_etfs }}
          INPUT_MAX_UNIVERSE_PAGES: ${{ github.event.inputs.max_universe_pages }}
          INPUT_SLEEP: ${{ github.event.inputs.sleep }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            INPUT_FETCH_FINANCIALS="false"
            INPUT_DISCOVER_UNIVERSE="false"
            INPUT_UNIVERSE_BACKFILL="false"
            INPUT_INCREMENTAL_ETF_BACKFILL="true"
            INPUT_YF_ETF_FALLBACK="true"
            INPUT_SLEEP="${STOCKANALYSIS_DAILY_SLEEP:-0.5}"
            INPUT_MAX_UNIVERSE_PAGES="${STOCKANALYSIS_DAILY_MAX_UNIVERSE_PAGES:-5}"
            if [ "$EVENT_SCHEDULE" = "50 22 * * 1-5" ]; then
              INPUT_HISTORY_GAPS_ONLY="true"
              INPUT_REQUIRED_HISTORY_PERIODS="daily_1y"
              INPUT_INCREMENTAL_ETF_LIMIT="${STOCKANALYSIS_DAILY1Y_INCREMENTAL_LIMIT:-120}"
              INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS="${STOCKANALYSIS_DAILY1Y_MAX_AGE_HOURS:-168}"
              INPUT_FETCH_SURFACES="false"
              INPUT_SURFACE_SET=""
              INPUT_CORE_BASKET_REFRESH="false"
              if [ -n "${STOCKANALYSIS_DAILY1Y_OFFSET:-}" ]; then
                INPUT_OFFSET="$STOCKANALYSIS_DAILY1Y_OFFSET"
              else
                INPUT_OFFSET="$(node scripts/select-stockanalysis-daily1y-offset.mjs)"
              fi
            else
              INPUT_HISTORY_GAPS_ONLY="false"
              INPUT_REQUIRED_HISTORY_PERIODS=""
              INPUT_INCREMENTAL_ETF_LIMIT="${STOCKANALYSIS_DAILY_INCREMENTAL_LIMIT:-40}"
              INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS="${STOCKANALYSIS_DAILY_MAX_AGE_HOURS:-168}"
              INPUT_FETCH_SURFACES="true"
              INPUT_SURFACE_SET="${STOCKANALYSIS_DAILY_SURFACE_SET:-core}"
              INPUT_CORE_BASKET_REFRESH="${STOCKANALYSIS_DAILY_CORE_BASKET_REFRESH:-true}"
              if [ "$EVENT_SCHEDULE" = "20 23 * * 0" ]; then
                # BACKLOG #331: one complete weekly universe collection. Current
                # measured universe is 11 pages; 100 preserves headroom without
                # turning weekday bounded runs into broad discovery.
                INPUT_DISCOVER_UNIVERSE="true"
                INPUT_MAX_UNIVERSE_PAGES="100"
              fi
            fi
          fi
          {
            echo "EFFECTIVE_HISTORY_GAPS_ONLY=${INPUT_HISTORY_GAPS_ONLY:-false}"
            echo "EFFECTIVE_REQUIRED_HISTORY_PERIODS=${INPUT_REQUIRED_HISTORY_PERIODS:-}"
            echo "EFFECTIVE_INCREMENTAL_ETF_MAX_AGE_HOURS=${INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS:-}"
            echo "EFFECTIVE_CORE_BASKET_DELTA_PASS=$(
              if [ "${INPUT_CORE_BASKET_REFRESH:-false}" = "true" ] || [ "${INPUT_DISCOVER_UNIVERSE:-false}" = "true" ]; then
                echo true
              else
                echo false
              fi
            )"
            echo "EFFECTIVE_STOCKANALYSIS_SLEEP=${INPUT_SLEEP:-0.25}"
            echo "EFFECTIVE_YF_ETF_FALLBACK=${INPUT_YF_ETF_FALLBACK:-true}"
          } >> "$GITHUB_ENV"
          if [ "${INPUT_CORE_BASKET_REFRESH:-false}" = "true" ]; then
            INPUT_ETFS="$(node -e 'const fs = require("fs"); const payload = JSON.parse(fs.readFileSync("data/admin/fenok-etf-core-daily-basket.json", "utf8")); const tickers = Array.isArray(payload.daily_refresh_universe?.tickers) ? payload.daily_refresh_universe.tickers : (Array.isArray(payload.rows) ? payload.rows.map((row) => row && row.ticker) : []); const seen = new Set(); const out = []; for (const raw of tickers) { const ticker = String(raw || "").trim().toUpperCase(); if (ticker && !seen.has(ticker)) { seen.add(ticker); out.push(ticker); } } if (!out.length) { console.error("Core Basket refresh requested, but no tickers were found"); process.exit(1); } process.stdout.write(out.join(","));')"
          fi
          if [ "${INPUT_RECONCILE_MISSING_ETF_DETAILS:-false}" = "true" ]; then
            ARGS="--sleep ${INPUT_SLEEP:-0.25} --endpoint-canary --reconcile-missing-etf-details --incremental-etf-limit ${INPUT_RECONCILE_MISSING_ETF_LIMIT:-0}"
            if [ -n "$INPUT_ETFS" ]; then ARGS="$ARGS --etfs $INPUT_ETFS"; fi
            if [ -n "$INPUT_OFFSET" ]; then ARGS="$ARGS --offset $INPUT_OFFSET"; fi
          elif [ "${INPUT_HISTORY_GAP_PLAN:-false}" = "true" ]; then
            ARGS="--sleep ${INPUT_SLEEP:-0.25} --incremental-etf-backfill --incremental-etf-only --history-gaps-only --plan-only --write-plan"
            PLAN_LIMIT="${INPUT_INCREMENTAL_ETF_LIMIT:-0}"
            if [ "$PLAN_LIMIT" = "120" ]; then PLAN_LIMIT="0"; fi
            ARGS="$ARGS --incremental-etf-limit $PLAN_LIMIT"
            if [ -n "$INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS" ]; then ARGS="$ARGS --incremental-etf-max-age-hours $INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS"; fi
            if [ -n "$INPUT_REQUIRED_HISTORY_PERIODS" ]; then ARGS="$ARGS --required-history-periods $INPUT_REQUIRED_HISTORY_PERIODS"; fi
            if [ -n "$INPUT_OFFSET" ]; then ARGS="$ARGS --offset $INPUT_OFFSET"; fi
          elif [ "${INPUT_HISTORY_GAPS_ONLY:-false}" = "true" ]; then
            ARGS="--sleep ${INPUT_SLEEP:-0.25} --endpoint-canary --incremental-etf-backfill --incremental-etf-only --history-gaps-only"
            if [ -n "$INPUT_REQUIRED_HISTORY_PERIODS" ]; then ARGS="$ARGS --required-history-periods $INPUT_REQUIRED_HISTORY_PERIODS"; fi
            if [ -n "$INPUT_INCREMENTAL_ETF_LIMIT" ]; then ARGS="$ARGS --incremental-etf-limit $INPUT_INCREMENTAL_ETF_LIMIT"; fi
            if [ -n "$INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS" ]; then ARGS="$ARGS --incremental-etf-max-age-hours $INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS"; fi
            if [ -n "$INPUT_OFFSET" ]; then ARGS="$ARGS --offset $INPUT_OFFSET"; fi
            if [ "${INPUT_YF_ETF_FALLBACK:-true}" = "true" ]; then ARGS="$ARGS --yf-etf-fallback"; fi
          else
            ARGS="--sleep ${INPUT_SLEEP:-0.25} --endpoint-canary --classify-etf-catalogs"
            if [ "${INPUT_DISCOVER_UNIVERSE:-true}" = "true" ]; then ARGS="$ARGS --discover-etf-universe"; fi
            if [ "${INPUT_UNIVERSE_BACKFILL:-false}" = "true" ]; then ARGS="$ARGS --universe-backfill"; fi
            if [ "${INPUT_INCREMENTAL_ETF_BACKFILL:-true}" = "true" ]; then ARGS="$ARGS --incremental-etf-backfill"; fi
            if [ "${INPUT_YF_ETF_FALLBACK:-true}" = "true" ]; then ARGS="$ARGS --yf-etf-fallback"; fi
            if [ -n "$INPUT_INCREMENTAL_ETF_LIMIT" ]; then ARGS="$ARGS --incremental-etf-limit $INPUT_INCREMENTAL_ETF_LIMIT"; fi
            if [ -n "$INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS" ]; then ARGS="$ARGS --incremental-etf-max-age-hours $INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS"; fi
            if [ "${INPUT_FETCH_SURFACES:-true}" = "true" ]; then ARGS="$ARGS --fetch-surfaces"; fi
            if [ -n "$INPUT_SURFACE_SET" ]; then ARGS="$ARGS --surface-set $INPUT_SURFACE_SET"; fi
            if [ -n "$INPUT_SURFACES" ]; then ARGS="$ARGS --surfaces $INPUT_SURFACES"; fi
            if [ -n "$INPUT_ETFS" ]; then ARGS="$ARGS --etfs $INPUT_ETFS"; fi
            if [ -n "$INPUT_STOCKS" ]; then ARGS="$ARGS --stocks $INPUT_STOCKS"; fi
            if [ "${INPUT_FETCH_FINANCIALS:-true}" = "true" ]; then ARGS="$ARGS --fetch-financials"; fi
            if [ -n "$INPUT_OFFSET" ]; then ARGS="$ARGS --offset $INPUT_OFFSET"; fi
            if [ -n "$INPUT_LIMIT_ETFS" ]; then ARGS="$ARGS --limit-etfs $INPUT_LIMIT_ETFS"; fi
            if [ -n "$INPUT_MAX_UNIVERSE_PAGES" ]; then ARGS="$ARGS --max-universe-pages $INPUT_MAX_UNIVERSE_PAGES"; fi
            if [ "${INPUT_YF_ETF_FALLBACK:-true}" != "true" ] && [ -n "$INPUT_ETFS" ]; then ARGS="$ARGS --fail-on-error"; fi
          fi
          set -o pipefail
          PRIMARY_FETCH_LOG="$RUNNER_TEMP/stockanalysis-primary-fetch.log"
          PRIMARY_FETCHED_TICKERS="$RUNNER_TEMP/stockanalysis-primary-fetched-tickers.txt"
          python3 scripts/fetch-stockanalysis.py $ARGS --no-public-mirror | tee "$PRIMARY_FETCH_LOG"
          awk '/^\[etf [0-9]+\/[0-9]+\]/ && $4 != "FAIL" { print $3 }' "$PRIMARY_FETCH_LOG" \
            | sort -u > "$PRIMARY_FETCHED_TICKERS"

      - name: Refresh history-gap plan after live backfill
        if: ${{ github.event.inputs.history_gaps_only == 'true' || github.event.schedule == '50 22 * * 1-5' }}
        env:
          INPUT_REQUIRED_HISTORY_PERIODS: ${{ github.event.inputs.required_history_periods }}
          INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS: ${{ github.event.inputs.incremental_etf_max_age_hours }}
        run: |
          REQUIRED_HISTORY_PERIODS="${EFFECTIVE_REQUIRED_HISTORY_PERIODS:-${INPUT_REQUIRED_HISTORY_PERIODS:-}}"
          MAX_AGE_HOURS="${EFFECTIVE_INCREMENTAL_ETF_MAX_AGE_HOURS:-${INPUT_INCREMENTAL_ETF_MAX_AGE_HOURS:-}}"
          ARGS="--incremental-etf-backfill --incremental-etf-only --history-gaps-only --plan-only --write-plan --incremental-etf-limit 0"
          if [ -n "$REQUIRED_HISTORY_PERIODS" ]; then ARGS="$ARGS --required-history-periods $REQUIRED_HISTORY_PERIODS"; fi
          if [ -n "$MAX_AGE_HOURS" ]; then ARGS="$ARGS --incremental-etf-max-age-hours $MAX_AGE_HOURS"; fi
          python3 scripts/fetch-stockanalysis.py $ARGS --no-public-mirror

      - name: Validate StockAnalysis contracts
        run: |
          python3 -m unittest scripts/test_fetch_stockanalysis_fixtures.py
          python3 -m unittest scripts/test_stockanalysis_surface_contract.py
          python3 scripts/test-stockanalysis-financials-fixtures.py
          python3 -m unittest scripts/test_audit_market_data.py
          node scripts/test-select-stockanalysis-daily1y-offset.mjs
          node scripts/test-write-fenok-etf-daily1y-readiness.mjs
          node scripts/test-build-fenok-etf-core-daily-basket.mjs
          ALT_TMPDIR="$RUNNER_TEMP/stockanalysis-contract-alt-tmp"
          mkdir -p "$ALT_TMPDIR"
          TMPDIR="$ALT_TMPDIR" python3 -m unittest scripts/test_fetch_stockanalysis_fixtures.py
          TMPDIR="$ALT_TMPDIR" node scripts/test-write-fenok-etf-daily1y-readiness.mjs
          TMPDIR="$ALT_TMPDIR" node scripts/test-build-fenok-etf-core-daily-basket.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- \
            data/stockanalysis \
            data/yf/etf-details \
            data/admin/data-supply-state/v1
          git restore --staged --worktree -- \
            data/stockanalysis/backfill/history_gap_report_latest.json \
            data/yf/finance/_summary.json
          git ls-files --modified --others --exclude-standard -z -- data/yf/finance \
            | git add --pathspec-from-file=- --pathspec-file-nul
          git diff --staged --quiet || git commit -m "chore: update stockanalysis data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1

      - name: Dispatch shared projection rebuild
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-manifest.yml --ref main
