name: Fetch Treasury TGA Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      controlled_failure_key:
        description: "Dispatch-only chaos key (allowed: tga)"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-treasury-tga:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test TGA producer contracts
        run: node scripts/test-fetch-treasury-tga.mjs

      - name: Fetch TGA JSON and persist attempt evidence
        id: fetch_tga
        env:
          INPUT_CONTROLLED_FAILURE_KEY: ${{ github.event_name == 'workflow_dispatch' && inputs.controlled_failure_key || '' }}
        run: node scripts/fetch-treasury-tga.mjs

      - name: Verify output
        if: ${{ steps.fetch_tga.outcome == 'success' }}
        run: |
          echo "=== Generated JSON ==="
          head -20 data/macro/tga.json
          echo "..."
          echo "Total lines: $(wc -l < data/macro/tga.json)"
          npm --prefix 100xfenok-next run qa:treasury-contract

      - name: Commit and push
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_tga.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHARD="data/admin/data-supply-state/detection-attempts/treasury_tga.json"
          # Phase 1: consume the generated policy while retaining the legacy
          # hand list as parity defense until this workflow's natural proof.
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/fetch-treasury-tga.yml \
            --stage always_if_exists
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ -f data/admin/treasury_tga/index.json ]]; then
            git add -- data/admin/treasury_tga/index.json
          fi
          if [[ -f data/admin/treasury_tga/lkg/tga.json ]]; then
            git add -- data/admin/treasury_tga/lkg/tga.json
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            scripts/stage-lane-manifest.sh \
              --workflow .github/workflows/fetch-treasury-tga.yml \
              --stage success_if_exists
            git add -- data/macro/tga.json 100xfenok-next/public/data/macro/tga.json
          fi
          if git diff --staged --quiet; then
            echo "No Treasury TGA changes to publish"
            exit 0
          fi
          git commit -m "chore: update Treasury TGA data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
