name: Fetch DefiLlama Stablecoins Data

on:
  schedule:
    - cron: '12 * * * *'
  workflow_dispatch:
    inputs:
      controlled_failure_endpoint:
        description: 'Dispatch-only LKG chaos endpoint (chart or stablecoins)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-defillama:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create data directory
        run: mkdir -p data data/macro 100xfenok-next/public/data/macro

      - name: Test DefiLlama producer contracts
        run: node scripts/test-fetch-defillama.mjs

      - name: Fetch stablecoins JSON
        id: fetch_defillama
        env:
          INPUT_CONTROLLED_FAILURE_ENDPOINT: ${{ github.event.inputs.controlled_failure_endpoint || '' }}
        run: node scripts/fetch-defillama.mjs

      - name: Verify output
        if: ${{ steps.fetch_defillama.outcome == 'success' }}
        run: |
          echo "=== Generated JSON ==="
          head -20 data/macro/stablecoins.json
          echo "..."
          echo "Total lines: $(wc -l < data/macro/stablecoins.json)"

      - name: Commit and push
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_defillama.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Phase 1 pilot: validate the generated manifest and stage only the
          # always-on policy before the legacy hand list runs as parity defense.
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/fetch-defillama.yml \
            --stage always_if_exists
          SHARD="data/admin/data-supply-state/detection-attempts/defillama_stablecoins.json"
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ -f data/admin/defillama_stablecoins/index.json ]]; then
            git add -- data/admin/defillama_stablecoins/index.json
          fi
          if [[ -f data/admin/defillama_stablecoins/lkg/stablecoins.json ]]; then
            git add -- data/admin/defillama_stablecoins/lkg/stablecoins.json
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            # Select the success policy independently; never flatten it into
            # the always/recovery stage above.
            scripts/stage-lane-manifest.sh \
              --workflow .github/workflows/fetch-defillama.yml \
              --stage success_if_exists
            git add -- data/macro/stablecoins.json 100xfenok-next/public/data/macro/stablecoins.json
          fi
          if git diff --staged --quiet; then
            echo "No DefiLlama stablecoins changes to publish"
            exit 0
          fi
          git commit -m "chore: update DefiLlama stablecoins data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
