name: Fetch DefiLlama Stablecoins Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch-defillama:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create data directory
        run: mkdir -p data data/macro 100xfenok-next/public/data/macro

      - name: Fetch stablecoins JSON
        run: |
          node << 'EOF_NODE'
          const https = require('https');
          const fs = require('fs');

          const chartUrl = 'https://stablecoins.llama.fi/stablecoincharts/all';
          const listUrl = 'https://stablecoins.llama.fi/stablecoins?includePrices=false';

          const MAX_RETRIES = 2;
          const BACKOFFS_MS = [1000, 2000, 4000];

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function fetchJson(url) {
            let lastError;
            for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
              try {
                if (attempt > 0) {
                  const delay = BACKOFFS_MS[Math.min(attempt - 1, BACKOFFS_MS.length - 1)] ?? 1000;
                  console.error(`[retry] ${url} attempt ${attempt + 1}/${MAX_RETRIES + 1} after ${delay}ms`);
                  await sleep(delay);
                }
                return await new Promise((resolve, reject) => {
                  https.get(url, (res) => {
                    let data = '';
                    res.on('data', chunk => data += chunk);
                    res.on('end', () => {
                      try {
                        if (res.statusCode < 200 || res.statusCode >= 300) {
                          throw new Error(`HTTP ${res.statusCode}: ${data.slice(0, 200)}`);
                        }
                        resolve(JSON.parse(data));
                      } catch (e) {
                        reject(e);
                      }
                    });
                  }).on('error', reject);
                });
              } catch (e) {
                lastError = e;
                if (attempt < MAX_RETRIES) continue;
              }
            }
            throw lastError;
          }

          async function main() {
            const [chart, stablecoins] = await Promise.all([
              fetchJson(chartUrl),
              fetchJson(listUrl),
            ]);

            if (!Array.isArray(chart) || chart.length === 0) {
              throw new Error('DefiLlama chart payload is empty');
            }

            const series = chart.map(row => ({
              date: new Date(row.date * 1000).toISOString().slice(0, 10),
              val: row.totalCirculating?.peggedUSD ?? 0
            }));

            const output = {
              updated: new Date().toISOString(),
              source: 'DefiLlama',
              current: series.at(-1)?.val ?? 0,
              series,
              stablecoins: Array.isArray(stablecoins) ? stablecoins : [],
              peggedAssets: Array.isArray(stablecoins?.peggedAssets) ? stablecoins.peggedAssets : []
            };

            fs.mkdirSync('data/macro', { recursive: true });
            fs.mkdirSync('100xfenok-next/public/data/macro', { recursive: true });
            const payload = JSON.stringify(output, null, 2);
            fs.writeFileSync('data/macro/stablecoins.json', payload);
            fs.writeFileSync('100xfenok-next/public/data/macro/stablecoins.json', payload);
            console.log(`Saved ${series.length} points to data/macro/stablecoins.json and public mirror`);
          }

          main().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          EOF_NODE

      - name: Verify output
        run: |
          echo "=== Generated JSON ==="
          head -20 data/macro/stablecoins.json
          echo "..."
          echo "Total lines: $(wc -l < data/macro/stablecoins.json)"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro/stablecoins.json 100xfenok-next/public/data/macro/stablecoins.json
          if git diff --staged --quiet; then
            echo "No DefiLlama stablecoins changes to publish"
            exit 0
          fi
          git commit -m "chore: update DefiLlama stablecoins data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
