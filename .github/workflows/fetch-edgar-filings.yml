# SEC EDGAR filing timeline refresh.
# Phase 1 default is a small batch so ready summary rows can be verified before scaling.

name: Fetch EDGAR Filing Timeline

on:
  schedule:
    # 매주 월요일 00:40 UTC (한국 월요일 09:40) — StockAnalysis refresh 이후 공시 목록만 보강
    - cron: '40 0 * * 1'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated ticker override (e.g. NVDA,AAPL,MSFT)'
        required: false
        default: ''
      limit:
        description: 'Ticker limit for phase-1 default run'
        required: false
        default: '50'
      full_universe:
        description: 'Scan the full stock universe instead of the phase-1 limit'
        required: false
        default: 'false'
      filings_per_ticker:
        description: 'Latest matching SEC filings per ticker'
        required: false
        default: '12'
      forms:
        description: 'Comma-separated SEC forms'
        required: false
        default: '10-K,10-Q,8-K,20-F,6-K'
      sleep:
        description: 'Seconds between SEC submission requests'
        required: false
        default: '0.6'
      plan_only:
        description: 'Resolve/fetch candidates without writing outputs'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  fetch-edgar-filings:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build EDGAR filing timeline
        env:
          INPUT_TICKERS: ${{ github.event.inputs.tickers || '' }}
          INPUT_LIMIT: ${{ github.event.inputs.limit || '50' }}
          INPUT_FULL_UNIVERSE: ${{ github.event.inputs.full_universe || 'false' }}
          INPUT_FILINGS_PER_TICKER: ${{ github.event.inputs.filings_per_ticker || '12' }}
          INPUT_FORMS: ${{ github.event.inputs.forms || '10-K,10-Q,8-K,20-F,6-K' }}
          INPUT_SLEEP: ${{ github.event.inputs.sleep || '0.6' }}
          INPUT_PLAN_ONLY: ${{ github.event.inputs.plan_only || 'false' }}
        run: |
          echo "EDGAR_PLAN_ONLY=${INPUT_PLAN_ONLY:-false}" >> "$GITHUB_ENV"
          ARGS=(--filings-per-ticker "${INPUT_FILINGS_PER_TICKER:-12}" --forms "${INPUT_FORMS:-10-K,10-Q,8-K,20-F,6-K}" --sleep "${INPUT_SLEEP:-0.6}")
          if [ -n "$INPUT_TICKERS" ]; then ARGS+=(--tickers "$INPUT_TICKERS"); fi
          if [ "$INPUT_FULL_UNIVERSE" = "true" ]; then
            ARGS+=(--full-universe)
          elif [ -n "$INPUT_LIMIT" ]; then
            ARGS+=(--limit "$INPUT_LIMIT")
          fi
          if [ "$INPUT_PLAN_ONLY" = "true" ]; then ARGS+=(--plan-only); fi
          node scripts/build-edgar-filing-timeline.mjs "${ARGS[@]}"

      - name: Validate EDGAR summary contracts
        if: ${{ env.EDGAR_PLAN_ONLY != 'true' }}
        run: npm --prefix 100xfenok-next run qa:edgar-summaries

      - name: Commit and push
        if: ${{ env.EDGAR_PLAN_ONLY != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- \
            data/edgar \
            data/edgar-korean-summaries \
            100xfenok-next/public/data/edgar-korean-summaries
          if git diff --staged --quiet; then
            echo "No EDGAR filing timeline changes to publish"
            exit 0
          fi
          git commit -m "data: update edgar filing timeline"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
