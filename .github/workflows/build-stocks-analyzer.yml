name: Build Stocks Analyzer

# Merge stocks_index + raw company_master + eps_consensus into a single
# native-ready stocks_analyzer.json for the stock-analyzer feature.
# Runs daily after the global-scouter raw export window.

on:
  schedule:
    - cron: '7 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  build-stocks-analyzer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: '22'

      - name: Build stocks_analyzer.json
        run: node scripts/build-stocks-analyzer.mjs

      - name: Build 13F analytics (trades ranking + portfolio views)
        run: |
          node scripts/build-13f-enrichment-backfill.mjs
          node scripts/build-13f-integrity-indexes.mjs
          node scripts/build-13f-trades.mjs
          node scripts/build-13f-portfolio-views.mjs
          node scripts/build-guru-holders-index.mjs

      - name: Build revision movers + industry benchmarks
        run: |
          node scripts/build-revision-movers.mjs
          node scripts/build-industry-benchmarks.mjs

      - name: Build Explore discovery summary
        run: node scripts/build-slickcharts-discovery.mjs

      - name: Build calendar previous-release values (FRED)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        # non-fatal: calendar context is an enhancement, not a build gate
        run: node scripts/build-calendar-prev.mjs || echo "calendar prev-values skipped"

      - name: Verify output
        run: |
          echo "=== stocks_analyzer.json header ==="
          head -20 data/global-scouter/core/stocks_analyzer.json
          echo "..."
          echo "Total stocks: $(node -e "console.log(JSON.parse(require('fs').readFileSync('data/global-scouter/core/stocks_analyzer.json','utf8')).count)")"

      - name: Sync global-scouter docs to public
        # README.md/schema.json are written only to data/ by the converter; mirror
        # them to public/ so the weekly refresh never leaves stale public docs.
        run: |
          cp data/global-scouter/README.md 100xfenok-next/public/data/global-scouter/README.md
          cp data/global-scouter/schema.json 100xfenok-next/public/data/global-scouter/schema.json

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/global-scouter/core/stocks_analyzer.json \
            data/global-scouter/core/per_bands_index.json \
            data/global-scouter/core/slick_index.json \
            data/sec-13f/by_ticker.json \
            data/sec-13f/by_sector.json \
            data/sec-13f/summary.json \
            data/sec-13f/investors/*.json \
            data/sec-13f/analytics/consensus.json \
            data/sec-13f/analytics/ticker_aliases.json \
            data/sec-13f/analytics/trades_ranking.json \
            data/sec-13f/analytics/portfolio_views.json \
            data/sec-13f/analytics/guru_holders_index.json \
            data/global-scouter/core/revision_movers.json \
            data/damodaran/industry_benchmarks.json \
            data/slickcharts/discovery-summary.json \
            data/calendar/prev-values.json \
            100xfenok-next/public/data/calendar/prev-values.json \
            100xfenok-next/public/data/global-scouter/core/revision_movers.json \
            100xfenok-next/public/data/damodaran/industry_benchmarks.json \
            100xfenok-next/public/data/slickcharts/discovery-summary.json \
            100xfenok-next/public/data/global-scouter/core/stocks_analyzer.json \
            100xfenok-next/public/data/global-scouter/core/per_bands_index.json \
            100xfenok-next/public/data/global-scouter/core/slick_index.json \
            100xfenok-next/public/data/global-scouter/README.md \
            100xfenok-next/public/data/global-scouter/schema.json \
            100xfenok-next/public/data/sec-13f/by_ticker.json \
            100xfenok-next/public/data/sec-13f/by_sector.json \
            100xfenok-next/public/data/sec-13f/summary.json \
            100xfenok-next/public/data/sec-13f/analytics/consensus.json \
            100xfenok-next/public/data/sec-13f/analytics/ticker_aliases.json \
            100xfenok-next/public/data/sec-13f/analytics/trades_ranking.json \
            100xfenok-next/public/data/sec-13f/analytics/portfolio_views.json \
            100xfenok-next/public/data/sec-13f/analytics/guru_holders_index.json
          find 100xfenok-next/public/data/sec-13f/investors \
            -maxdepth 1 -name '*.json' ! -name 'griffin.json' -print0 | xargs -0 git add
          if git diff --staged --quiet; then
            echo "No stocks analyzer or 13F analytics changes to publish"
            exit 0
          fi
          git commit -m "data: refresh stocks_analyzer.json + 13f analytics"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
