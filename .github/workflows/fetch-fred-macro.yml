# Macro FRED data collection with current-attempt evidence.
# Outputs: data/macro/fred-macro.json + public mirror + one lane shard.

name: Fetch FRED Macro Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      controlled_failure_key:
        description: 'Dispatch-only chaos key (one configured FRED series id)'
        required: false
        default: ''
        type: string

env:
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  fetch-fred-macro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test FRED macro producer contracts
        run: node scripts/test-fetch-fred-macro.mjs

      - name: Fetch macro FRED data and persist attempt evidence
        id: fetch_macro
        env:
          INPUT_CONTROLLED_FAILURE_KEY: ${{ github.event.inputs.controlled_failure_key || '' }}
        run: node scripts/fetch-fred-macro.mjs

      - name: Verify output
        if: ${{ steps.fetch_macro.outcome == 'success' }}
        run: |
          head -20 data/macro/fred-macro.json
          echo "Total lines: $(wc -l < data/macro/fred-macro.json)"

      - name: Commit and push macro FRED data
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          FETCH_OUTCOME: ${{ steps.fetch_macro.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHARD="data/admin/data-supply-state/detection-attempts/fred_macro.json"
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ -f data/admin/fred_macro/index.json ]]; then
            git add -- data/admin/fred_macro/index.json
          fi
          if [[ -f data/admin/fred_macro/lkg/fred_macro.json ]]; then
            git add -- data/admin/fred_macro/lkg/fred_macro.json
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            git add -- data/macro/fred-macro.json 100xfenok-next/public/data/macro/fred-macro.json
          fi
          if git diff --staged --quiet; then
            echo "No FRED macro changes to publish"
            exit 0
          fi
          git commit -m "chore: update FRED macro data"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              gh workflow run update-manifest.yml --ref main
              exit 0
            fi
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
