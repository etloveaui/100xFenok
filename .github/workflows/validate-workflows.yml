# Guardrail for workflow parse errors.
#
# If a workflow YAML file is malformed, GitHub may create a failed run with
# no jobs and no downloadable logs. This separate guard parses workflow YAML
# files so syntax failures leave a normal, readable job log.
name: Validate GitHub Workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'scripts/ops/fixtures/workflow-actionlint/**'
      - 'scripts/ops/validate-workflow-actionlint.sh'
      - 'scripts/ops/validate-workflow-yaml.rb'
      - 'scripts/ops/check-pipeline-job-health.mjs'
      - 'scripts/ops/emit-alarm-state.mjs'
      - 'scripts/ops/test-check-pipeline-job-health.mjs'
      - 'scripts/ops/test-emit-alarm-state.mjs'
      - 'scripts/stage-lane-manifest.sh'
      - 'scripts/test-pipeline-failure-alarm-manifest.mjs'
      - 'scripts/test-stage-lane-manifest.mjs'
      - '100xfenok-next/package.json'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/ops/fixtures/workflow-actionlint/**'
      - 'scripts/ops/validate-workflow-actionlint.sh'
      - 'scripts/ops/validate-workflow-yaml.rb'
      - 'scripts/ops/check-pipeline-job-health.mjs'
      - 'scripts/ops/emit-alarm-state.mjs'
      - 'scripts/ops/test-check-pipeline-job-health.mjs'
      - 'scripts/ops/test-emit-alarm-state.mjs'
      - 'scripts/stage-lane-manifest.sh'
      - 'scripts/test-pipeline-failure-alarm-manifest.mjs'
      - 'scripts/test-stage-lane-manifest.mjs'
      - '100xfenok-next/package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-workflow-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse workflow YAML
        run: ruby scripts/ops/validate-workflow-yaml.rb

      - name: Validate lane manifest staging
        run: npm --prefix 100xfenok-next run qa:lane-manifest-staging

      - name: Validate alarm workflow contracts
        run: npm --prefix 100xfenok-next run qa:alarm-state

      - name: Install pinned actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}" \
            --output "$RUNNER_TEMP/$archive"
          echo "$ACTIONLINT_SHA256  $RUNNER_TEMP/$archive" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/$archive" --directory "$RUNNER_TEMP" actionlint
          echo "ACTIONLINT_BIN=$RUNNER_TEMP/actionlint" >> "$GITHUB_ENV"

      - name: Validate workflow expressions
        run: bash scripts/ops/validate-workflow-actionlint.sh
