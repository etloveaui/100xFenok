# SlickCharts Historical Stock Data Pipeline
# Scrapes returns history (47yr) and dividend history (13yr) per stock
#
# Schedule: Monthly on 1st at 9:00 AM UTC (1hr after monthly to avoid conflict)
# Note: Historical data changes infrequently (returns: yearly, dividends: quarterly)
# DEC-102: Changed from 8:00 to 9:00 UTC to prevent Git Lock with monthly workflow
#
# Uses matrix builds for parallel execution:
# - Batch A-D: ~130 stocks
# - Batch E-L: ~130 stocks
# - Batch M-R: ~130 stocks
# - Batch S-Z: ~130 stocks
#
# Created: 2026-01-10
# Reference: Individual Stock Data Pipeline v2 (#151)

name: SlickCharts History

on:
  schedule:
    # Monthly on 1st at 9:00 AM UTC (DEC-102: moved from 8:00 to avoid monthly conflict)
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Which scraper to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - returns
          - dividends
          - membership
      batch:
        description: 'Which batch (for returns/dividends)'
        required: false
        default: 'ALL'
        type: choice
        options:
          - ALL
          - A-D
          - E-L
          - M-R
          - S-Z
          - single
      symbol:
        description: 'Single symbol (only if batch=single)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  # Run membership tracker first
  membership:
    if: ${{ github.event.inputs.batch != 'single' || github.event.inputs.scraper == 'membership' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Membership Tracker
        run: |
          python scripts/scrapers/membership-tracker.py --dry-run --quiet

      - name: Dispatch membership projection
        if: ${{ github.event.inputs.scraper == 'membership' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-manifest.yml --ref main -f rebuild_slickcharts=true

  # Scrape returns history (matrix builds)
  scrape-returns:
    if: ${{ (github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'returns' || github.event_name == 'schedule') && github.event.inputs.batch != 'single' }}
    needs: membership
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [A-D, E-L, M-R, S-Z]

    steps:
      - name: Configure returns attempt telemetry path
        run: echo "SLICKCHARTS_ATTEMPT_EVENTS_PATH=$RUNNER_TEMP/slickcharts-history-returns-${{ matrix.batch }}.jsonl" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Returns scraper (batch ${{ matrix.batch }})
        if: ${{ github.event.inputs.batch == 'ALL' || github.event.inputs.batch == matrix.batch || github.event_name == 'schedule' }}
        run: |
          python scripts/scrapers/symbol-returns-scraper.py \
            --batch ${{ matrix.batch }} \
            --output data/slickcharts/stocks-returns-${{ matrix.batch }}.json \
            --pretty

      - name: Upload batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: returns-${{ matrix.batch }}
          path: data/slickcharts/stocks-returns-${{ matrix.batch }}.json
          retention-days: 1

      - name: Upload returns attempt telemetry
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: attempt-returns-${{ matrix.batch }}
          path: ${{ env.SLICKCHARTS_ATTEMPT_EVENTS_PATH }}
          if-no-files-found: ignore
          retention-days: 1

  # Scrape dividend history (matrix builds)
  scrape-dividends:
    if: ${{ (github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'dividends' || github.event_name == 'schedule') && github.event.inputs.batch != 'single' }}
    needs: membership
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch: [A-D, E-L, M-R, S-Z]

    steps:
      - name: Configure dividends attempt telemetry path
        run: echo "SLICKCHARTS_ATTEMPT_EVENTS_PATH=$RUNNER_TEMP/slickcharts-history-dividends-${{ matrix.batch }}.jsonl" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Dividends scraper (batch ${{ matrix.batch }})
        if: ${{ github.event.inputs.batch == 'ALL' || github.event.inputs.batch == matrix.batch || github.event_name == 'schedule' }}
        run: |
          python scripts/scrapers/symbol-dividend-scraper.py \
            --batch ${{ matrix.batch }} \
            --output data/slickcharts/stocks-dividends-${{ matrix.batch }}.json \
            --pretty

      - name: Upload batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: dividends-${{ matrix.batch }}
          path: data/slickcharts/stocks-dividends-${{ matrix.batch }}.json
          retention-days: 1

      - name: Upload dividends attempt telemetry
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: attempt-dividends-${{ matrix.batch }}
          path: ${{ env.SLICKCHARTS_ATTEMPT_EVENTS_PATH }}
          if-no-files-found: ignore
          retention-days: 1

  # Merge all batch files
  merge-history:
    needs: [scrape-returns, scrape-dividends]
    runs-on: ubuntu-latest
    if: >-
      ${{ always()
          && (github.event.inputs.batch == 'ALL' || github.event_name == 'schedule')
          && github.event.inputs.batch != 'single'
          && (github.event_name == 'schedule'
              || github.event.inputs.scraper == 'all'
              || github.event.inputs.scraper == 'returns'
              || github.event.inputs.scraper == 'dividends') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify lane-registry commit-shard contract
        run: node scripts/test-slickcharts-commit-shards.mjs

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move and merge returns
        if: ${{ github.event_name == 'schedule' || github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'returns' }}
        run: |
          mkdir -p data/slickcharts
          mv artifacts/returns-A-D/*.json data/slickcharts/
          mv artifacts/returns-E-L/*.json data/slickcharts/
          mv artifacts/returns-M-R/*.json data/slickcharts/
          mv artifacts/returns-S-Z/*.json data/slickcharts/

          # Merge returns batches (if merger script exists)
          if [ -f scripts/scrapers/symbol-returns-scraper.py ]; then
            python scripts/scrapers/symbol-returns-scraper.py \
              --merge \
              data/slickcharts/stocks-returns-A-D.json \
              data/slickcharts/stocks-returns-E-L.json \
              data/slickcharts/stocks-returns-M-R.json \
              data/slickcharts/stocks-returns-S-Z.json \
              --output data/slickcharts/stocks-returns.json
          fi

      - name: Move and merge dividends
        if: ${{ github.event_name == 'schedule' || github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'dividends' }}
        run: |
          mv artifacts/dividends-A-D/*.json data/slickcharts/
          mv artifacts/dividends-E-L/*.json data/slickcharts/
          mv artifacts/dividends-M-R/*.json data/slickcharts/
          mv artifacts/dividends-S-Z/*.json data/slickcharts/

          # Merge dividend batches (if merger script exists)
          if [ -f scripts/scrapers/symbol-dividend-scraper.py ]; then
            python scripts/scrapers/symbol-dividend-scraper.py \
              --merge \
              data/slickcharts/stocks-dividends-A-D.json \
              data/slickcharts/stocks-dividends-E-L.json \
              data/slickcharts/stocks-dividends-M-R.json \
              data/slickcharts/stocks-dividends-S-Z.json \
              --output data/slickcharts/stocks-dividends.json
          fi

      - name: Clean up batch files
        run: |
          rm -f data/slickcharts/stocks-returns-A-D.json
          rm -f data/slickcharts/stocks-returns-E-L.json
          rm -f data/slickcharts/stocks-returns-M-R.json
          rm -f data/slickcharts/stocks-returns-S-Z.json
          rm -f data/slickcharts/stocks-dividends-A-D.json
          rm -f data/slickcharts/stocks-dividends-E-L.json
          rm -f data/slickcharts/stocks-dividends-M-R.json
          rm -f data/slickcharts/stocks-dividends-S-Z.json

      - name: Aggregate into individual stock files
        run: |
          # Create stocks directory
          mkdir -p data/slickcharts/stocks

          # Run aggregator to create individual stock JSON files
          # Uses: symbols.json (weekly metrics) + stocks-returns.json + stocks-dividends.json
          # --split-dividends: Creates recent (5yr) + historical split for large dividend files
          python scripts/scrapers/stock-aggregator.py \
            --metrics data/slickcharts/symbols.json \
            --returns data/slickcharts/stocks-returns.json \
            --dividends data/slickcharts/stocks-dividends.json \
            --output-dir data/slickcharts/stocks/ \
            --split-dividends data/slickcharts/ \
            --retention-days 365

      - name: Validate SlickCharts integrity
        run: |
          python scripts/scrapers/membership-tracker.py --dry-run --quiet
          python scripts/validate-slickcharts-integrity.py --skip-public

      - name: Emit SlickCharts history attempt
        if: ${{ always() }}
        run: |
          node scripts/emit-slickcharts-attempt.mjs \
            --member history \
            --events-root artifacts \
            --outcome "${{ needs.scrape-returns.result }}" \
            --outcome "${{ needs.scrape-dividends.result }}" \
            --outcome "${{ job.status }}" \
            --row "$RUNNER_TEMP/slickcharts-history-row.json"

      - name: Commit and push changes
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          scripts/publish-slickcharts-attempt.sh \
            history \
            "$RUNNER_TEMP/slickcharts-history-row.json" \
            "chore: update SlickCharts stock history $(date -u +%Y-%m-%d)" \
            --manifest-workflow .github/workflows/slickcharts-history.yml \
            --manifest-always always_if_exists \
            -- \
            data/slickcharts/stocks-returns.json \
            data/slickcharts/stocks-dividends.json \
            data/slickcharts/stocks-dividends-recent.json \
            data/slickcharts/stocks-dividends-historical.json \
            data/slickcharts/stocks/

  # Single symbol scraping for testing
  scrape-single:
    if: ${{ github.event.inputs.batch == 'single' && github.event.inputs.symbol != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure single-symbol attempt telemetry path
        run: echo "SLICKCHARTS_ATTEMPT_EVENTS_PATH=$RUNNER_TEMP/slickcharts-history-single.jsonl" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start from latest main
        run: |
          git fetch --depth=1 origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: "Run Returns scraper (single: ${{ github.event.inputs.symbol }})"
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'returns' }}
        run: |
          python scripts/scrapers/symbol-returns-scraper.py \
            --symbol ${{ github.event.inputs.symbol }} \
            --pretty

      - name: "Run Dividends scraper (single: ${{ github.event.inputs.symbol }})"
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'dividends' }}
        run: |
          python scripts/scrapers/symbol-dividend-scraper.py \
            --symbol ${{ github.event.inputs.symbol }} \
            --pretty

      - name: Emit SlickCharts history attempt
        if: ${{ always() }}
        run: |
          node scripts/emit-slickcharts-attempt.mjs \
            --member history \
            --events "$SLICKCHARTS_ATTEMPT_EVENTS_PATH" \
            --outcome "${{ job.status }}" \
            --row "$RUNNER_TEMP/slickcharts-history-row.json"

      - name: Commit history attempt
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          scripts/publish-slickcharts-attempt.sh \
            history \
            "$RUNNER_TEMP/slickcharts-history-row.json" \
            "chore: record SlickCharts history attempt $(date -u +%Y-%m-%d)"
