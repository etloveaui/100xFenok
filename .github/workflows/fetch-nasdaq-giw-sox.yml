# Nasdaq GIW SOX daily constituent refresh.
# Public GIW free view exposes official SOX constituents, not official weight columns.
# RIM weights are methodology-derived from stock_action market caps.

name: Fetch Nasdaq GIW SOX Constituents

on:
  schedule:
    # Weekday refresh after US close (KST Tue-Sat 08:50).
    - cron: '50 23 * * 1-5'
  workflow_dispatch:
    inputs:
      controlled_failure_key:
        description: 'Dispatch-only chaos key (constituents)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  fetch-sox-giw:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start from latest main
        run: |
          git fetch origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test Nasdaq GIW SOX producer contracts
        run: node scripts/test-fetch-nasdaq-giw-sox-constituents.mjs

      - name: Fetch Nasdaq GIW SOX constituents
        id: fetch_sox
        # This lane owns constituent membership only. Yahoo quote/history stays
        # in the Yahoo lane; a new member is pending until its next natural run.
        env:
          INPUT_CONTROLLED_FAILURE_KEY: ${{ github.event.inputs.controlled_failure_key || '' }}
        run: node scripts/fetch-nasdaq-giw-sox-constituents.mjs --no-public-mirror

      - name: Commit and push SOX daily data
        if: ${{ always() }}
        env:
          FETCH_OUTCOME: ${{ steps.fetch_sox.outcome }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHARD="data/admin/data-supply-state/detection-attempts/nasdaq_giw_sox.json"
          # Phase 1: consume the generated policy while retaining the legacy
          # hand list as parity defense until this workflow's natural proof.
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/fetch-nasdaq-giw-sox.yml \
            --stage always_if_exists
          if [[ -f "$SHARD" ]]; then
            git add -- "$SHARD"
          fi
          if [[ -f data/admin/nasdaq_giw_sox/index.json ]]; then
            git add -- data/admin/nasdaq_giw_sox/index.json
          fi
          if [[ -f data/admin/nasdaq_giw_sox/lkg/constituents.json ]]; then
            git add -- data/admin/nasdaq_giw_sox/lkg/constituents.json
          fi
          if [[ -f data/admin/nasdaq_giw_sox/history/constituents.json ]]; then
            git add -- data/admin/nasdaq_giw_sox/history/constituents.json
          fi
          if [[ "$FETCH_OUTCOME" == "success" ]]; then
            scripts/stage-lane-manifest.sh \
              --workflow .github/workflows/fetch-nasdaq-giw-sox.yml \
              --stage success_if_exists
            git add -- data/indices/nasdaq-giw-sox-constituents.json
          fi
          if git diff --staged --quiet; then
            echo "No SOX GIW changes to publish"
            exit 0
          fi
          git diff --staged --quiet || git commit -m "data: refresh SOX GIW RIM inputs"
          for attempt in $(seq 1 5); do
            if ! git pull --rebase --autostash origin main; then
              echo "git rebase failed on attempt ${attempt}; aborting and retrying"
              git rebase --abort >/dev/null 2>&1 || true
              sleep 3
              continue
            fi
            if git push; then
              exit 0
            fi
            echo "git push race on attempt ${attempt}; retrying after rebase"
            sleep 3
          done
          echo "git push failed after retrying concurrent main updates"
          exit 1
