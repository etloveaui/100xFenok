# Update Manifest — Automatic manifest.json sync
#
# Triggered whenever data/ or the manifest updater script changes on main.
# Updates file_count, updated, last_updated, generatedAt, categories, and manifest_version.
#
# Infinite loop prevention:
#   This workflow ignores data/manifest.json and data/computed/**, so its own
#   manifest/signals commit can still trigger deploy without retriggering itself.
#
# What is updated:  file_count, updated, last_updated, generatedAt, categories, manifest_version
# What is NOT touched: version, update_frequency, source, description, recent_changes

name: Update Manifest

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - '!data/manifest.json'
      - '!data/computed/**'
      - 'scripts/update-manifest.py'
      - 'scripts/export-computed-signals.mjs'
      - 'tools/macro-monitor/shared/signals-core.mjs'
  schedule:
    # UTC 02:30 = KST 11:30. Morning reconciliation.
    - cron: '30 2 * * *'
    # UTC 09:30 = KST 18:30. Runs after daily FRED/SlickCharts refresh windows.
    - cron: '30 9 * * *'
  workflow_dispatch:

concurrency:
  group: update-manifest
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for git push (manifest.json update)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history so BEFORE_SHA diff always resolves

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export computed signals
        run: node scripts/export-computed-signals.mjs

      - name: Run update-manifest.py
        # Exit code 1 = warnings only (orphan files / missing folders)
        # These are non-fatal — the manifest update still proceeds
        # BEFORE_SHA: covers ALL commits in the push (not just HEAD~1)
        # Scheduled/manual runs infer the last manifest refresh commit.
        env:
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || 'AUTO' }}
        run: |
          set +e
          python3 scripts/update-manifest.py
          status=$?
          if [ "$status" -eq 1 ]; then
            exit 0
          fi
          exit "$status"

      - name: Check if manifest changed
        id: check
        run: |
          git diff --quiet \
              data/computed/signals.json \
              data/manifest.json \
              100xfenok-next/public/data/computed/signals.json \
              100xfenok-next/public/data/manifest.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit and push manifest (with rebase retry)
        if: steps.check.outputs.changed == 'true'
        env:
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || 'AUTO' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            node scripts/export-computed-signals.mjs

            status=0
            BEFORE_SHA="${BEFORE_SHA}" python3 scripts/update-manifest.py || status=$?
            if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
              echo "update-manifest.py exited with $status on attempt $attempt"
              exit "$status"
            fi

            if git diff --quiet \
                data/computed/signals.json \
                data/manifest.json \
                100xfenok-next/public/data/computed/signals.json \
                100xfenok-next/public/data/manifest.json; then
              echo "Attempt $attempt: manifest already current on latest main — nothing to push"
              exit 0
            fi

            git add \
              data/computed/signals.json \
              data/manifest.json \
              100xfenok-next/public/data/computed/signals.json \
              100xfenok-next/public/data/manifest.json
            git commit -m "chore: update computed signals and manifest"

            if git push origin HEAD:main; then
              echo "Attempt $attempt: push succeeded"
              exit 0
            fi

            echo "Attempt $attempt: push rejected, retrying..."
            sleep $((attempt * 3))
          done

          echo "All 3 attempts failed"
          exit 1

      - name: No changes needed
        if: steps.check.outputs.changed == 'false'
        run: echo "manifest.json already up to date — nothing to commit"
