# Update Manifest — single writer for shared derived/public projections
#
# Source workflows commit only their owned acquisition artifacts. This workflow
# rebuilds shared market/ETF/edge/RIM/KPI projections from committed source data,
# then publishes one conflict-free generated-data commit.
#
# Infinite loop prevention:
#   This workflow ignores data/manifest.json, data/computed/**, and the generated
#   admin usage/product coverage/KPI manifests, so its own generated-data commit can
#   still trigger deploy without retriggering itself.
#
# Manifest fields updated: file_count, updated, last_updated, generatedAt, categories, manifest_version
# Manifest fields preserved: version, update_frequency, source, description, recent_changes

name: Update Manifest

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - '!data/yf/**'
      - '!data/admin/yahoo-batch-quote-history/**'
      - '!data/manifest.json'
      - '!data/computed/**'
      - '!data/admin/data-usage-manifest.json'
      - '!data/admin/product-surface-coverage.json'
      - '!data/admin/fenok-data-health-kpi.json'
      - '!data/admin/fenok-s1-stock-public-promotion-dry-run.json'
      - '!data/admin/fenok-edge-coverage-index.json'
      - '!data/admin/fenok-s0-finra-occ-mapping-ledger.json'
      - '!data/admin/fenok-edge-etf-daily1y-readiness.json'
      - '!data/admin/fenok-edge-etf-daily1y-fetchable-plan.json'
      - '!data/admin/fenok-etf-core-daily-basket.json'
      - '!data/admin/fenok-edge-korea-krx-daily-index.json'
      - '!data/admin/data-supply-state/**'
      - '!data/stockanalysis/**'
      - '!data/slickcharts/discovery-summary.json'
      - '!data/slickcharts/membership-changes.json'
      - '!data/slickcharts/universe.json'
      - 'scripts/update-manifest.py'
      - 'scripts/export-computed-signals.mjs'
      - 'scripts/build-phase2-closeout-indexes.mjs'
      - 'scripts/build-fenok-signals.mjs'
      - 'scripts/build-slickcharts-discovery.mjs'
      - 'scripts/scrapers/membership-tracker.py'
      - 'scripts/write-fenok-s1-stock-public-promotion-dry-run.mjs'
      - 'scripts/build-fenok-edge-coverage-index.mjs'
      - 'scripts/audit-fenok-s0-source-gaps.mjs'
      - 'scripts/write-fenok-etf-daily1y-readiness.mjs'
      - 'scripts/audit-fenok-stock-promotion-candidates.mjs'
      - 'scripts/stock-action-score-core.mjs'
      - 'scripts/build-rim-index.mjs'
      - 'scripts/test-build-rim-index.mjs'
      - 'scripts/fetch-nasdaq-giw-sox-constituents.mjs'
      - 'scripts/generate-product-surface-coverage.mjs'
      - 'scripts/build-fenok-data-health-kpi.mjs'
      - 'scripts/lib/market-calendar.mjs'
      - 'scripts/lib/kpi-runtime-projection.mjs'
      - 'scripts/lib/kpi-runtime-slots.mjs'
      - 'scripts/lib/kpi-contract-constants.mjs'
      - 'tools/macro-monitor/shared/signals-core.mjs'
  schedule:
    # UTC 02:30 = KST 11:30. Morning reconciliation.
    - cron: '30 2 * * *'
    # UTC 09:30 = KST 18:30. Runs after daily FRED/SlickCharts refresh windows.
    - cron: '30 9 * * *'
  workflow_dispatch:
    inputs:
      # KPI v2 authoritative-dispatch envelope (contract §3). Populated by the
      # edge/krx daily workflows when they dispatch this reconciliation.
      source_workflow:
        description: 'Origin workflow file that dispatched this run (allowlist)'
        required: false
        default: ''
      source_run_id:
        description: 'Origin workflow run id'
        required: false
        default: ''
      source_run_attempt:
        description: 'Origin workflow run attempt'
        required: false
        default: ''
      original_event:
        description: 'Origin trigger event (schedule for authoritative)'
        required: false
        default: ''
      slot_key:
        description: 'Origin canonical slot_key (§2)'
        required: false
        default: ''
      rebuild_slickcharts:
        description: 'Rebuild SlickCharts membership, discovery, and public mirror from committed canonical data'
        required: false
        default: false
        type: boolean

concurrency:
  group: fenok-data-writer-refs/heads/main
  cancel-in-progress: false
  queue: max

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    # KPI v2 builder reads GITHUB_* defaults plus this origin envelope from env.
    # KPI_EVENT_SCHEDULE = the exact cron that triggered a scheduled run, so slot
    # inference uses the run's OWN cron (never latest-across-crons).
    env:
      KPI_EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
      KPI_ORIGIN_SOURCE_WORKFLOW: ${{ github.event.inputs.source_workflow || '' }}
      KPI_ORIGIN_SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id || '' }}
      KPI_ORIGIN_SOURCE_RUN_ATTEMPT: ${{ github.event.inputs.source_run_attempt || '' }}
      KPI_ORIGIN_ORIGINAL_EVENT: ${{ github.event.inputs.original_event || '' }}
      KPI_ORIGIN_SLOT_KEY: ${{ github.event.inputs.slot_key || '' }}
    permissions:
      contents: write  # Required for git push (manifest.json update)
      actions: write   # Required to dispatch Worker deploy after bot-authored commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history so BEFORE_SHA diff always resolves

      - name: Start from latest main
        run: |
          git fetch origin +main:refs/remotes/origin/main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild and verify SlickCharts projections from committed source
        env:
          REBUILD_SLICKCHARTS: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event.inputs.rebuild_slickcharts == 'true' }}
        run: |
          if [ "$REBUILD_SLICKCHARTS" = "true" ]; then
            python scripts/scrapers/membership-tracker.py --quiet
            node scripts/build-slickcharts-discovery.mjs
          fi
          mkdir -p 100xfenok-next/public/data/slickcharts
          rsync -a --checksum --delete data/slickcharts/ 100xfenok-next/public/data/slickcharts/
          python3 scripts/validate-slickcharts-integrity.py
          diff -qr data/slickcharts 100xfenok-next/public/data/slickcharts

      - name: Build shared market and stock promotion state
        run: |
          python3 scripts/rebuild-yf-finance-summary.py
          python3 scripts/build-market-facts.py --no-public-mirror
          python3 scripts/build-market-source-parity.py
          npm --prefix 100xfenok-next run build:history-gap-daily1y
          python3 scripts/audit-market-data.py --output data/computed/market_data_audit.json --mirror-public
          node scripts/write-fenok-s1-stock-public-promotion-dry-run.mjs --check

      - name: Export computed signals
        run: node scripts/export-computed-signals.mjs

      - name: Build phase2 closeout indexes
        run: node scripts/build-phase2-closeout-indexes.mjs

      - name: Build Fenok stock signals
        run: node scripts/build-fenok-signals.mjs

      - name: Build RIM and ETF projections
        run: |
          node scripts/build-rim-index.mjs
          node scripts/build-fenok-etf-signals.mjs
          node scripts/build-fenok-etf-action-index.mjs
          node scripts/build-fenok-etf-core-daily-basket.mjs --check

      - name: Build Fenok edge projections
        run: |
          node scripts/build-fenok-edge-coverage-index.mjs
          node scripts/audit-fenok-s0-source-gaps.mjs --check --write-ledger
          node scripts/write-fenok-etf-daily1y-readiness.mjs --check
          npm --prefix 100xfenok-next run build:fenok-etf-daily1y-dispatch-plan

      - name: Run update-manifest.py
        # Exit code 1 = warnings only (orphan files / missing folders)
        # These are non-fatal — the manifest update still proceeds
        # BEFORE_SHA: covers ALL commits in the push (not just HEAD~1)
        # Scheduled/manual runs infer the last manifest refresh commit.
        env:
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || 'AUTO' }}
        run: |
          set +e
          python3 scripts/update-manifest.py
          status=$?
          if [ "$status" -eq 1 ]; then
            exit 0
          fi
          exit "$status"

      - name: Rebuild RIM index inputs after manifest refresh
        run: |
          node scripts/build-rim-index.mjs
          npm --prefix 100xfenok-next run build:data-entity-graph

      - name: Build product surface coverage
        run: node scripts/generate-product-surface-coverage.mjs

      - name: Project centrally owned public mirrors
        run: |
          mkdir -p \
            100xfenok-next/public/data/yf/finance \
            100xfenok-next/public/data/stockanalysis \
            100xfenok-next/public/data/indices \
            100xfenok-next/public/data/admin \
            100xfenok-next/public/data/computed/market_facts \
            100xfenok-next/public/data/computed
          rsync -a --checksum --delete data/yf/finance/ 100xfenok-next/public/data/yf/finance/
          rsync -a --checksum --delete data/stockanalysis/ 100xfenok-next/public/data/stockanalysis/
          cp data/indices/nasdaq-giw-sox-constituents.json 100xfenok-next/public/data/indices/nasdaq-giw-sox-constituents.json
          cp data/admin/fenok-edge-korea-krx-daily-index.json 100xfenok-next/public/data/admin/fenok-edge-korea-krx-daily-index.json
          cp data/computed/fenok_occ_options_availability.json 100xfenok-next/public/data/computed/fenok_occ_options_availability.json
          cp data/computed/market_facts/index.json 100xfenok-next/public/data/computed/market_facts/index.json
          (cd 100xfenok-next && node sync-static-overrides.mjs)

      - name: Build data health KPI
        run: |
          npm --prefix 100xfenok-next run build:fenok-data-health-kpi
          node 100xfenok-next/scripts/check-fenok-public-mirror-guard.mjs
          npm --prefix 100xfenok-next run qa:fenok-data-health-kpi
          npm --prefix 100xfenok-next run build:static-route-manifest

      - name: Check if manifest changed
        id: check
        run: |
          git diff --quiet \
              data/computed/signals.json \
              data/computed/stock_action_index.json \
              data/computed/stock_action_summary.json \
              data/computed/fenok_signals.json \
              data/computed/fenok_signals_summary.json \
              data/computed/fenok_etf_signals.json \
              data/computed/fenok_etf_signals_summary.json \
              data/computed/etf_action_index.json \
              data/computed/fenok_etf_core_daily_basket_summary.json \
              data/computed/market_facts/ \
              data/computed/market_source_parity.json \
              data/computed/market_data_audit.json \
              data/computed/entity_graph.json \
              data/computed/entity_graph_stock_index.json \
              data/computed/entity_graph_stock_services.json \
              data/computed/market_structure_index.json \
              data/computed/rim-index/inputs.json \
              data/yf/finance/_summary.json \
              data/stockanalysis/backfill/history_gap_report_latest.json \
              data/slickcharts/discovery-summary.json \
              data/slickcharts/membership-changes.json \
              data/slickcharts/universe.json \
              data/admin/fenok-s1-stock-public-promotion-dry-run.json \
              data/admin/fenok-edge-coverage-index.json \
              data/admin/fenok-s0-finra-occ-mapping-ledger.json \
              data/admin/fenok-edge-etf-daily1y-readiness.json \
              data/admin/fenok-edge-etf-daily1y-fetchable-plan.json \
              data/admin/fenok-etf-core-daily-basket.json \
              data/admin/data-usage-manifest.json \
              data/admin/product-surface-coverage.json \
              data/admin/fenok-data-health-kpi.json \
              data/manifest.json \
              100xfenok-next/public/data/computed/signals.json \
              100xfenok-next/public/data/computed/stock_action_index.json \
              100xfenok-next/public/data/computed/stock_action_summary.json \
              100xfenok-next/public/data/computed/fenok_signals_summary.json \
              100xfenok-next/public/data/computed/fenok_etf_signals_summary.json \
              100xfenok-next/public/data/computed/fenok_etf_core_daily_basket_summary.json \
              100xfenok-next/public/data/computed/fenok_occ_options_availability.json \
              100xfenok-next/public/data/computed/market_facts/index.json \
              100xfenok-next/public/data/computed/market_source_parity.json \
              100xfenok-next/public/data/computed/market_data_audit.json \
              100xfenok-next/public/data/computed/entity_graph.json \
              100xfenok-next/public/data/computed/entity_graph_stock_index.json \
              100xfenok-next/public/data/computed/entity_graph_stock_services.json \
              100xfenok-next/public/data/computed/market_structure_index.json \
              100xfenok-next/public/data/computed/rim-index/inputs.json \
              100xfenok-next/public/data/yf/finance/ \
              100xfenok-next/public/data/stockanalysis/ \
              100xfenok-next/public/data/indices/nasdaq-giw-sox-constituents.json \
              100xfenok-next/public/data/slickcharts/ \
              100xfenok-next/public/data/admin/fenok-edge-korea-krx-daily-index.json \
              100xfenok-next/public/data/admin/fenok-edge-coverage-index.json \
              100xfenok-next/public/data/admin/data-usage-manifest.json \
              100xfenok-next/public/data/admin/product-surface-coverage.json \
              100xfenok-next/public/data/admin/fenok-data-health-kpi.json \
              100xfenok-next/public/data/manifest.json \
              100xfenok-next/src/generated/static-route-manifest.ts \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit and push manifest (with rebase retry)
        if: steps.check.outputs.changed == 'true'
        env:
          BEFORE_SHA: ${{ github.event_name == 'push' && github.event.before || 'AUTO' }}
          REBUILD_SLICKCHARTS: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event.inputs.rebuild_slickcharts == 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            if [ "$REBUILD_SLICKCHARTS" = "true" ]; then
              python scripts/scrapers/membership-tracker.py --quiet
              node scripts/build-slickcharts-discovery.mjs
            fi
            mkdir -p 100xfenok-next/public/data/slickcharts
            rsync -a --checksum --delete data/slickcharts/ 100xfenok-next/public/data/slickcharts/
            python3 scripts/validate-slickcharts-integrity.py
            diff -qr data/slickcharts 100xfenok-next/public/data/slickcharts

            python3 scripts/rebuild-yf-finance-summary.py
            python3 scripts/build-market-facts.py --no-public-mirror
            python3 scripts/build-market-source-parity.py
            npm --prefix 100xfenok-next run build:history-gap-daily1y
            python3 scripts/audit-market-data.py --output data/computed/market_data_audit.json --mirror-public
            node scripts/write-fenok-s1-stock-public-promotion-dry-run.mjs --check
            node scripts/export-computed-signals.mjs
            node scripts/build-phase2-closeout-indexes.mjs
            node scripts/build-fenok-signals.mjs
            node scripts/build-rim-index.mjs
            node scripts/build-fenok-etf-signals.mjs
            node scripts/build-fenok-etf-action-index.mjs
            node scripts/build-fenok-etf-core-daily-basket.mjs --check
            node scripts/build-fenok-edge-coverage-index.mjs
            node scripts/audit-fenok-s0-source-gaps.mjs --check --write-ledger
            node scripts/write-fenok-etf-daily1y-readiness.mjs --check
            npm --prefix 100xfenok-next run build:fenok-etf-daily1y-dispatch-plan

            status=0
            BEFORE_SHA="${BEFORE_SHA}" python3 scripts/update-manifest.py || status=$?
            if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
              echo "update-manifest.py exited with $status on attempt $attempt"
              exit "$status"
            fi
            node scripts/build-rim-index.mjs
            npm --prefix 100xfenok-next run build:data-entity-graph
            node scripts/generate-product-surface-coverage.mjs
            mkdir -p \
              100xfenok-next/public/data/yf/finance \
              100xfenok-next/public/data/stockanalysis \
              100xfenok-next/public/data/indices \
              100xfenok-next/public/data/admin \
              100xfenok-next/public/data/computed/market_facts \
              100xfenok-next/public/data/computed
            rsync -a --checksum --delete data/yf/finance/ 100xfenok-next/public/data/yf/finance/
            rsync -a --checksum --delete data/stockanalysis/ 100xfenok-next/public/data/stockanalysis/
            cp data/indices/nasdaq-giw-sox-constituents.json 100xfenok-next/public/data/indices/nasdaq-giw-sox-constituents.json
            cp data/admin/fenok-edge-korea-krx-daily-index.json 100xfenok-next/public/data/admin/fenok-edge-korea-krx-daily-index.json
            cp data/computed/fenok_occ_options_availability.json 100xfenok-next/public/data/computed/fenok_occ_options_availability.json
            cp data/computed/market_facts/index.json 100xfenok-next/public/data/computed/market_facts/index.json
            (cd 100xfenok-next && node sync-static-overrides.mjs)
            npm --prefix 100xfenok-next run build:fenok-data-health-kpi
            node 100xfenok-next/scripts/check-fenok-public-mirror-guard.mjs
            npm --prefix 100xfenok-next run qa:fenok-data-health-kpi
            npm --prefix 100xfenok-next run build:static-route-manifest

            if git diff --quiet \
                data/computed/signals.json \
                data/computed/stock_action_index.json \
                data/computed/stock_action_summary.json \
                data/computed/fenok_signals.json \
                data/computed/fenok_signals_summary.json \
                data/computed/fenok_etf_signals.json \
                data/computed/fenok_etf_signals_summary.json \
                data/computed/etf_action_index.json \
                data/computed/fenok_etf_core_daily_basket_summary.json \
                data/computed/market_facts/ \
                data/computed/market_source_parity.json \
                data/computed/market_data_audit.json \
                data/computed/entity_graph.json \
                data/computed/entity_graph_stock_index.json \
                data/computed/entity_graph_stock_services.json \
                data/computed/market_structure_index.json \
                data/computed/rim-index/inputs.json \
                data/yf/finance/_summary.json \
                data/stockanalysis/backfill/history_gap_report_latest.json \
                data/slickcharts/discovery-summary.json \
                data/slickcharts/membership-changes.json \
                data/slickcharts/universe.json \
                data/admin/fenok-s1-stock-public-promotion-dry-run.json \
                data/admin/fenok-edge-coverage-index.json \
                data/admin/fenok-s0-finra-occ-mapping-ledger.json \
                data/admin/fenok-edge-etf-daily1y-readiness.json \
                data/admin/fenok-edge-etf-daily1y-fetchable-plan.json \
                data/admin/fenok-etf-core-daily-basket.json \
                data/admin/data-usage-manifest.json \
                data/admin/product-surface-coverage.json \
                data/admin/fenok-data-health-kpi.json \
                data/manifest.json \
                100xfenok-next/public/data/computed/signals.json \
                100xfenok-next/public/data/computed/stock_action_index.json \
                100xfenok-next/public/data/computed/stock_action_summary.json \
                100xfenok-next/public/data/computed/fenok_signals_summary.json \
                100xfenok-next/public/data/computed/fenok_etf_signals_summary.json \
                100xfenok-next/public/data/computed/fenok_etf_core_daily_basket_summary.json \
                100xfenok-next/public/data/computed/fenok_occ_options_availability.json \
                100xfenok-next/public/data/computed/market_facts/index.json \
                100xfenok-next/public/data/computed/market_source_parity.json \
                100xfenok-next/public/data/computed/market_data_audit.json \
                100xfenok-next/public/data/computed/entity_graph.json \
                100xfenok-next/public/data/computed/entity_graph_stock_index.json \
                100xfenok-next/public/data/computed/entity_graph_stock_services.json \
                100xfenok-next/public/data/computed/market_structure_index.json \
                100xfenok-next/public/data/computed/rim-index/inputs.json \
                100xfenok-next/public/data/yf/finance/ \
                100xfenok-next/public/data/stockanalysis/ \
                100xfenok-next/public/data/indices/nasdaq-giw-sox-constituents.json \
                100xfenok-next/public/data/slickcharts/ \
                100xfenok-next/public/data/admin/fenok-edge-korea-krx-daily-index.json \
                100xfenok-next/public/data/admin/fenok-edge-coverage-index.json \
                100xfenok-next/public/data/admin/data-usage-manifest.json \
                100xfenok-next/public/data/admin/product-surface-coverage.json \
                100xfenok-next/public/data/admin/fenok-data-health-kpi.json \
                100xfenok-next/public/data/manifest.json \
                100xfenok-next/src/generated/static-route-manifest.ts; then
              echo "Attempt $attempt: manifest already current on latest main — nothing to push"
              exit 0
            fi

            git add -- \
              data/computed/signals.json \
              data/computed/stock_action_index.json \
              data/computed/stock_action_summary.json \
              data/computed/fenok_signals.json \
              data/computed/fenok_signals_summary.json \
              data/computed/fenok_etf_signals.json \
              data/computed/fenok_etf_signals_summary.json \
              data/computed/etf_action_index.json \
              data/computed/fenok_etf_core_daily_basket_summary.json \
              data/computed/market_facts/ \
              data/computed/market_source_parity.json \
              data/computed/market_data_audit.json \
              data/computed/entity_graph.json \
              data/computed/entity_graph_stock_index.json \
              data/computed/entity_graph_stock_services.json \
              data/computed/market_structure_index.json \
              data/computed/rim-index/inputs.json \
              data/yf/finance/_summary.json \
              data/stockanalysis/backfill/history_gap_report_latest.json \
              data/slickcharts/discovery-summary.json \
              data/slickcharts/membership-changes.json \
              data/slickcharts/universe.json \
              data/admin/fenok-s1-stock-public-promotion-dry-run.json \
              data/admin/fenok-edge-coverage-index.json \
              data/admin/fenok-s0-finra-occ-mapping-ledger.json \
              data/admin/fenok-edge-etf-daily1y-readiness.json \
              data/admin/fenok-edge-etf-daily1y-fetchable-plan.json \
              data/admin/fenok-etf-core-daily-basket.json \
              data/admin/data-usage-manifest.json \
              data/admin/product-surface-coverage.json \
              data/admin/fenok-data-health-kpi.json \
              data/manifest.json \
              100xfenok-next/public/data/computed/signals.json \
              100xfenok-next/public/data/computed/stock_action_index.json \
              100xfenok-next/public/data/computed/stock_action_summary.json \
              100xfenok-next/public/data/computed/fenok_signals_summary.json \
              100xfenok-next/public/data/computed/fenok_etf_signals_summary.json \
              100xfenok-next/public/data/computed/fenok_etf_core_daily_basket_summary.json \
              100xfenok-next/public/data/computed/fenok_occ_options_availability.json \
              100xfenok-next/public/data/computed/market_facts/index.json \
              100xfenok-next/public/data/computed/market_source_parity.json \
              100xfenok-next/public/data/computed/market_data_audit.json \
              100xfenok-next/public/data/computed/entity_graph.json \
              100xfenok-next/public/data/computed/entity_graph_stock_index.json \
              100xfenok-next/public/data/computed/entity_graph_stock_services.json \
              100xfenok-next/public/data/computed/market_structure_index.json \
              100xfenok-next/public/data/computed/rim-index/inputs.json \
              100xfenok-next/public/data/yf/finance/ \
              100xfenok-next/public/data/stockanalysis/ \
              100xfenok-next/public/data/indices/nasdaq-giw-sox-constituents.json \
              100xfenok-next/public/data/slickcharts/ \
              100xfenok-next/public/data/admin/fenok-edge-korea-krx-daily-index.json \
              100xfenok-next/public/data/admin/fenok-edge-coverage-index.json \
              100xfenok-next/public/data/admin/data-usage-manifest.json \
              100xfenok-next/public/data/admin/product-surface-coverage.json \
              100xfenok-next/public/data/admin/fenok-data-health-kpi.json \
              100xfenok-next/public/data/manifest.json \
              100xfenok-next/src/generated/static-route-manifest.ts
            git commit -m "chore: update computed signals and manifest"

            if git push origin HEAD:main; then
              echo "Attempt $attempt: push succeeded"
              exit 0
            fi

            echo "Attempt $attempt: push rejected, retrying..."
            sleep $((attempt * 3))
          done

          echo "All 3 attempts failed"
          exit 1

      - name: No changes needed
        if: steps.check.outputs.changed == 'false'
        run: echo "manifest.json already up to date — nothing to commit"

      - name: Dispatch Worker deploy for generated-data commit
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-worker.yml --ref main
