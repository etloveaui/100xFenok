name: Pipeline Failure Alarm

on:
  schedule:
    - cron: '23 * * * *'
  workflow_run:
    workflows: ['Update Manifest', 'Deploy Worker (Cloudflare)']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: pipeline-failure-alarm
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check pipeline job health
        id: pipeline
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PIPELINE_JOB_HEALTH_RESULT: pipeline-job-health-result.json
        run: node scripts/ops/check-pipeline-job-health.mjs

      - name: Emit alarm state
        if: always()
        continue-on-error: true
        env:
          PIPELINE_JOB_HEALTH_RESULT: pipeline-job-health-result.json
        run: node scripts/ops/emit-alarm-state.mjs

      - name: Commit alarm state
        if: always()
        continue-on-error: true
        run: |
          # Fail-closed: this whole step is continue-on-error so an alarm-state
          # commit failure can NEVER mask the alarm — the OPS issue + job failure
          # (below) stay the primary channel. [skip ci] keeps this ops-metadata
          # commit from re-triggering the pipeline it is reporting on.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          scripts/stage-lane-manifest.sh \
            --workflow .github/workflows/pipeline-failure-alarm.yml \
            --stage always_if_exists || exit 0
          git add data/admin/alarm-state.json 100xfenok-next/public/data/admin/alarm-state.json || exit 0
          if git diff --cached --quiet; then
            echo "alarm-state unchanged; nothing to commit"
            exit 0
          fi
          branch="${GITHUB_REF_NAME:-main}"
          git commit -m "ops: refresh alarm-state.json [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin "$branch" && git push origin "HEAD:$branch"; then
              exit 0
            fi
            sleep $((attempt * 3))
          done

      - name: Prepare issue body
        if: steps.pipeline.outcome == 'failure'
        run: |
          node <<'NODE'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('pipeline-job-health-result.json', 'utf8'));
          fs.writeFileSync('pipeline-job-health-issue.md', result.issueBody || result.message || 'Pipeline job failure alarm fired.');
          fs.writeFileSync('pipeline-job-health-title.txt', result.issueTitle || '100xFenok pipeline job failure alarm');
          NODE

      - name: Open or update OPS issue
        if: steps.pipeline.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="$(cat pipeline-job-health-title.txt)"
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file pipeline-job-health-issue.md
          else
            gh issue create --title "$title" --body-file pipeline-job-health-issue.md
          fi

      - name: Fail on alarm
        if: steps.pipeline.outcome == 'failure'
        run: exit 1
